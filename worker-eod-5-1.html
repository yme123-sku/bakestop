const SB_URL = 'https://lwmhoanpqrfpqiuwuuxi.supabase.co';

// ── OFFLINE-FIRST SYNC ──
const PENDING_KEY = 'bakery_pending_sync';

function getPendingQueue(){
  try { return JSON.parse(localStorage.getItem(PENDING_KEY) || '[]'); } catch(e){ return []; }
}
function savePendingQueue(q){
  localStorage.setItem(PENDING_KEY, JSON.stringify(q));
}
function addToPendingQueue(payload){
  const q = getPendingQueue();
  // Remove existing entry for same date
  const filtered = q.filter(function(p){ return p.payload.date !== payload.date; });
  filtered.push({ createdAt: new Date().toISOString(), payload: payload });
  savePendingQueue(filtered);
}

async function sendToSupabase(eodData) {
  try {
    const res = await fetch(SB_URL + '/rest/v1/condit_eod', {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({
        id: eodData.date + '_main',
        date: eodData.date,
        submitted_at: new Date().toISOString(),
        entries: eodData.entries
      })
    });
    return res.ok;
  } catch(e) {
    console.error('Supabase error:', e);
    return false;
  }
}

async function syncPendingQueue(){
  const q = getPendingQueue();
  if(!q.length) return;
  const remaining = [];
  for(var i=0; i<q.length; i++){
    const ok = await sendToSupabase(q[i].payload);
    if(!ok) remaining.push(q[i]);
  }
  savePendingQueue(remaining);
  updateSyncStatus();
}

function updateSyncStatus(){
  const q   = getPendingQueue();
  const el  = document.getElementById('sync-status');
  if(!el) return;
  if(q.length === 0){
    el.textContent = '🟢 מסונכרן';
    el.style.color = '#15803d';
  } else {
    el.textContent = '🟡 ממתין (' + q.length + ')';
    el.style.color = '#d97706';
  }
}

// Retry every 30 seconds
setInterval(function(){
  const q = getPendingQueue();
  if(q.length > 0) syncPendingQueue();
}, 30000);

  const today = todayKey();
  const tod   = entries[today] || {};
  const list  = document.getElementById("eod-list");
  list.innerHTML = "";
  CATEGORIES.forEach(cat => {
    const items = products.filter(p => p.category === cat);
    if (!items.length) return;
    const group = document.createElement("div");
    group.className = "cat-group";
    group.innerHTML = `<div class="cat-header">${cat}</div>`;
    items.forEach(p => {
      const qty  = tod[p.id];
      const hasV = qty !== undefined && qty !== "";
      const isR  = hasV && qty > 0 && p.shelfDays === 1;
      const isY  = hasV && qty > 0 && p.shelfDays === 2;
      const row  = document.createElement("div");
      row.className = "product-row" + (isR?" red":isY?" yellow":"");
      row.innerHTML = `
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-meta">${p.shelfDays} ${p.shelfDays===1?"יום":"ימים"} · ${p.packaging}</div>
        </div>
        ${isR?'<span class="status-dot">🔴</span>':isY?'<span class="status-dot">🟡</span>':""}
        <div class="stepper ${hasV&&qty!==""?"has-val":""}">
          <button type="button" class="btn-step btn-minus" data-id="${p.id}">-</button>
          <input class="qty-input" type="number" min="0" placeholder="0" inputmode="numeric"
            value="${hasV?qty:""}" data-id="${p.id}">
          <button type="button" class="btn-step btn-plus" data-id="${p.id}">+</button>
        </div>`;
      group.appendChild(row);
    });
    list.appendChild(group);
  });

  list.querySelectorAll(".qty-input").forEach(inp => {
    inp.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        const all     = Array.from(list.querySelectorAll(".qty-input"));
        const visible = all.filter(i => !i.closest('.product-row').classList.contains('hidden-filter'));
        const idx     = visible.indexOf(this);
        if (idx > -1 && idx < visible.length-1) { visible[idx+1].focus(); visible[idx+1].select(); }
        else this.blur();
      }
    });
    inp.addEventListener("input", function() { updateSingleEntry(this.dataset.id, this.value); });
    inp.addEventListener("focus", function() { setTimeout(()=>this.select(), 50); });
  });

  list.querySelectorAll(".btn-minus").forEach(btn => {
    btn.addEventListener("click", function() {
      const inp = list.querySelector(`.qty-input[data-id="${this.dataset.id}"]`);
      const val = inp.value===""?0:Number(inp.value);
      if (val>0){ inp.value=val-1; updateSingleEntry(this.dataset.id, inp.value); }
    });
  });
  list.querySelectorAll(".btn-plus").forEach(btn => {
    btn.addEventListener("click", function() {
      const inp = list.querySelector(`.qty-input[data-id="${this.dataset.id}"]`);
      inp.value = (inp.value===""?0:Number(inp.value))+1;
      updateSingleEntry(this.dataset.id, inp.value);
    });
  });
  updateProgress(); updateBadges(); applyFilterVisibility();
}

function updateSingleEntry(id, val) {
  const today = todayKey();
  const numId = Number(id);
  if (!entries[today]) entries[today] = {};
  entries[today][numId] = val===""?"":Number(val);
  save();
  const list    = document.getElementById("eod-list");
  const inp     = list.querySelector(`.qty-input[data-id="${id}"]`);
  const stepper = inp.closest(".stepper");
  stepper.classList.toggle("has-val", val!=="");
  const p   = products.find(x=>x.id===numId);
  const qty = Number(val);
  const row = inp.closest(".product-row");
  row.classList.remove("red","yellow");
  const dot = row.querySelector(".status-dot");
  if (dot) dot.remove();
  if (val!==""&&qty>0) {
    if (p.shelfDays===1){ row.classList.add("red"); row.insertBefore(Object.assign(document.createElement("span"),{className:"status-dot",textContent:"🔴"}),stepper); }
    if (p.shelfDays===2){ row.classList.add("yellow"); row.insertBefore(Object.assign(document.createElement("span"),{className:"status-dot",textContent:"🟡"}),stepper); }
  }
  updateProgress(); updateBadges();
}

function setEODFilter(type) {
  currentFilter = type;
  document.getElementById("filter-all").classList.toggle("active", type==='all');
  document.getElementById("filter-pending").classList.toggle("active", type==='pending');
  applyFilterVisibility();
}

function applyFilterVisibility() {
  const tod = entries[todayKey()]||{};
  document.querySelectorAll("#eod-list .cat-group").forEach(group => {
    let vis = 0;
    group.querySelectorAll(".product-row").forEach(row => {
      const id     = Number(row.querySelector(".qty-input").dataset.id);
      const hasVal = tod[id]!==undefined && tod[id]!=="";
      if (currentFilter==='pending'&&hasVal) row.classList.add("hidden-filter");
      else { row.classList.remove("hidden-filter"); vis++; }
    });
    if (currentFilter==='pending'&&vis===0) group.classList.add("hidden-filter");
    else group.classList.remove("hidden-filter");
  });
}

function updateProgress() {
  const tod    = entries[todayKey()]||{};
  const filled = products.filter(p=>tod[p.id]!==undefined&&tod[p.id]!=="").length;
  document.getElementById("progress-fill").style.width=(products.length?filled/products.length*100:0)+"%";
  document.getElementById("progress-text").textContent=filled+"/"+products.length;
}

function updateBadges() {
  const tod    = entries[todayKey()]||{};
  const alerts = products.filter(p=>tod[p.id]>0&&p.shelfDays===1).length;
  const warns  = products.filter(p=>tod[p.id]>0&&p.shelfDays===2).length;
  const badge  = document.getElementById("alert-badge");
  badge.style.display = alerts>0?"block":"none";
  badge.textContent   = `⚠️ ${alerts} פגים מחר`;
  document.getElementById("tab-alerts").textContent   = `🔔 התראות${alerts+warns>0?` (${alerts+warns})`:""}`;
  document.getElementById("tab-products").textContent = `⚙️ מוצרים (${products.length})`;
}

function renderAlerts() {
  const tod    = entries[todayKey()]||{};
  const alerts = products.filter(p=>tod[p.id]>0&&p.shelfDays===1);
  const warns  = products.filter(p=>tod[p.id]>0&&p.shelfDays===2);
  const el     = document.getElementById("alerts-content");
  if (!alerts.length&&!warns.length){ el.innerHTML=`<div id="no-alerts"><div class="icon">✅</div><div class="msg">אין התראות</div><div class="sub">מלא את טופס סוף היום כדי לראות התראות</div></div>`; return; }
  let html="";
  if (alerts.length){ html+=`<div class="alert-section"><div class="alert-header red"><span style="font-size:18px">🔴</span> פגים מחר — חייבים למכור היום</div>`; alerts.forEach(p=>{ html+=`<div class="alert-row red"><div><div style="font-weight:600;font-size:15px">${p.name}</div><div class="alert-cat red">${p.category}</div></div><div class="alert-qty red">${tod[p.id]} ${p.packaging}</div></div>`; }); html+=`</div>`; }
  if (warns.length){ html+=`<div class="alert-section"><div class="alert-header yellow"><span style="font-size:18px">🟡</span> פגים מחרתיים</div>`; warns.forEach(p=>{ html+=`<div class="alert-row yellow"><div><div style="font-weight:600;font-size:15px">${p.name}</div><div class="alert-cat yellow">${p.category}</div></div><div class="alert-qty yellow">${tod[p.id]} ${p.packaging}</div></div>`; }); html+=`</div>`; }
  el.innerHTML=html;
}

function renderProducts() {
  const el=document.getElementById("products-list"); el.innerHTML="";
  CATEGORIES.forEach(cat=>{
    const items=products.filter(p=>p.category===cat); if(!items.length)return;
    const group=document.createElement("div"); group.className="cat-group";
    group.innerHTML=`<div class="cat-header">${cat} (${items.length})</div>`;
    items.forEach(p=>{ const row=document.createElement("div"); row.className="setting-row"; row.innerHTML=`<div style="flex:1"><div style="font-size:14px;font-weight:500">${p.name}</div><div style="font-size:11px;color:#b09080;margin-top:2px">${p.packaging}</div></div><input class="shelf-input" type="number" min="1" max="30" value="${p.shelfDays}" data-id="${p.id}"><span class="shelf-label">ימים</span><button class="icon-btn" onclick="startEdit(${p.id})">✏️</button><button class="icon-btn" onclick="deleteProduct(${p.id})">🗑️</button>`; group.appendChild(row); });
    el.appendChild(group);
  });
  el.querySelectorAll(".shelf-input").forEach(inp=>{ inp.addEventListener("change",function(){ const id=Number(this.dataset.id),val=Math.max(1,Number(this.value)); this.value=val; products=products.map(p=>p.id===id?{...p,shelfDays:val}:p); save(); }); });
}

function openAddForm(){ editingId=null; document.getElementById("add-form-title").textContent="מוצר חדש"; document.getElementById("f-name").value=""; document.getElementById("f-cat").value="בחושות"; document.getElementById("f-shelf").value=2; document.getElementById("f-pack").value="יחידה"; document.querySelector(".save-btn").textContent="הוסף"; document.getElementById("add-form").classList.add("open"); }
function closeAddForm(){ document.getElementById("add-form").classList.remove("open"); editingId=null; }
function startEdit(id){ const p=products.find(x=>x.id===id); editingId=id; document.getElementById("add-form-title").textContent="עריכת מוצר"; document.getElementById("f-name").value=p.name; document.getElementById("f-cat").value=p.category; document.getElementById("f-shelf").value=p.shelfDays; document.getElementById("f-pack").value=p.packaging; document.querySelector(".save-btn").textContent="שמור"; document.getElementById("add-form").classList.add("open"); document.getElementById("add-form").scrollIntoView({behavior:"smooth"}); }
function saveProduct(){ const name=document.getElementById("f-name").value.trim(); if(!name)return; const obj={name,category:document.getElementById("f-cat").value,shelfDays:Number(document.getElementById("f-shelf").value),packaging:document.getElementById("f-pack").value}; if(editingId!==null){ products=products.map(p=>p.id===editingId?{...obj,id:editingId}:p); }else{ const id=Math.max(0,...products.map(p=>p.id))+1; products.push({...obj,id}); } save(); closeAddForm(); renderProducts(); updateBadges(); }
function deleteProduct(id){ if(!confirm("למחוק את המוצר?"))return; products=products.filter(p=>p.id!==id); save(); renderProducts(); renderEOD(); }

async function sendEOD() {
  const today      = todayKey();
  const yesterday  = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yKey       = yesterday.toISOString().split('T')[0];
  const todData    = entries[today]  || {};
  const yestData   = entries[yKey]   || {};
  const todFilled  = Object.values(todData).filter(v=>v!=='').length;
  const yestFilled = Object.values(yestData).filter(v=>v!=='').length;

  let useDate = today;
  let useData = todData;
  if (todFilled === 0 && yestFilled > 0) {
    if (!confirm('אין נתונים להיום.\nנמצאו נתונים מאתמול ('+yKey+') — '+yestFilled+' מוצרים.\nלשלוח את הנתונים של אתמול?')) return;
    useDate = yKey;
    useData = yestData;
  } else if (todFilled === 0) {
    alert('לא הוזנו נתונים');
    return;
  }

  const btn        = document.getElementById('send-btn');
  const eodEntries = products.map(p=>({ id:p.id, name:p.name, category:p.category, qty:useData[p.id]!==undefined&&useData[p.id]!==''?Number(useData[p.id]):0, shelfDays:p.shelfDays, packaging:p.packaging }));
  const payload    = { date:useDate, entries:eodEntries };

  btn.textContent='⏳ שולח...'; btn.disabled=true;

  // Save locally first — never lose data
  addToPendingQueue(payload);
  updateSyncStatus();

  const ok = await sendToSupabase(payload);
  if(ok){
    savePendingQueue(getPendingQueue().filter(function(p){ return p.payload.date !== useDate; }));
    updateSyncStatus();
    btn.textContent='✓ נשלח!'; btn.style.background='#15803d';
    // Start polling for admin confirmation
    startAppliedPolling(useDate);
  } else {
    btn.textContent='🟡 שמור — ישלח כשיהיה חיבור'; btn.style.background='#d97706';
  }
  btn.disabled=false;
  setTimeout(()=>{ btn.textContent='📤 שלח לסיכום'; btn.style.background='#22c55e'; },3000);
}

var _appliedPollInterval = null;

function startAppliedPolling(date){
  if(_appliedPollInterval) clearInterval(_appliedPollInterval);
  updateAppliedStatus(date);
  _appliedPollInterval = setInterval(function(){ updateAppliedStatus(date); }, 30000);
}

async function updateAppliedStatus(date){
  var el = document.getElementById('applied-status');
  if(!el) return;
  try {
    var eodId = date + '_main';
    var res = await fetch(SB_URL + '/rest/v1/condit_eod?id=eq.'+encodeURIComponent(eodId)+'&select=applied_at', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    var rows = await res.json();
    if(rows && rows.length && rows[0].applied_at){
      var t = rows[0].applied_at.slice(11,16);
      el.textContent = '✅ אדמין עדכן מלאי · ' + t;
      el.style.color = '#15803d';
      el.style.background = '#f0fdf4';
      el.style.borderColor = '#bbf7d0';
      if(_appliedPollInterval){ clearInterval(_appliedPollInterval); _appliedPollInterval=null; }
    } else {
      el.textContent = '⏳ ממתין לאישור אדמין...';
      el.style.color = '#b45309';
      el.style.background = '#fffbeb';
      el.style.borderColor = '#fde68a';
    }
    el.style.display = 'flex';
  } catch(e) {
    el.style.display = 'none';
  }
}

function printEOD() {
  const today = todayKey();
  const tod   = entries[today] || {};

  const rows = products.map(p => {
    const qty = tod[p.id]!==undefined && tod[p.id]!=='' ? tod[p.id] : '—';
    const clr = qty!=='—' ? '#2c1810' : '#ccc';
    return '<tr>'
      +'<td style="padding:6px 10px;border-bottom:1px solid #e8ddd0">'+p.name+'</td>'
      +'<td style="padding:6px 10px;border-bottom:1px solid #e8ddd0;text-align:center;color:#8b6f5e;font-size:12px">'+p.category+'</td>'
      +'<td style="padding:6px 10px;border-bottom:1px solid #e8ddd0;text-align:center;font-weight:800;color:'+clr+'">'+qty+'</td>'
      +"<td style='padding:6px 10px;border-bottom:1px solid #e8ddd0;text-align:center;font-size:12px'>"+p.shelfDays+" י'</td>"
      +'<td style="padding:6px 10px;border-bottom:1px solid #e8ddd0;text-align:center;font-size:12px">'+p.packaging+'</td>'
      +'</tr>';
  }).join('');

  const printTime = new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});

  // Save original body
  const origBody = document.body.innerHTML;
  const origTitle = document.title;

  // Replace body with print content
  document.title = 'סוף יום ' + today;
  document.body.innerHTML = `
    <div style="font-family:Arial,sans-serif;direction:rtl;padding:20px;color:#2c1810;">
      <h2 style="font-size:18px;margin-bottom:2px;">דוח סוף יום — קונדיטוריה</h2>
      <p style="font-size:12px;color:#8b6f5e;margin-bottom:14px;">${today} · ${printTime}</p>
      <button onclick="restoreEOD()" style="margin-bottom:14px;padding:8px 16px;cursor:pointer;background:#e5e7eb;border:none;border-radius:6px;font-weight:700;font-family:Arial;">← חזור</button>
      <button onclick="window.print()" style="margin-bottom:14px;margin-right:8px;padding:8px 16px;cursor:pointer;background:#c8a96e;border:none;border-radius:6px;font-weight:700;font-family:Arial;color:#fff;">הדפס</button>
      <table style="width:100%;border-collapse:collapse;">
        <thead><tr>
          <th style="text-align:right;padding:8px 10px;background:#f5f0e8;font-size:12px;border-bottom:2px solid #c8a96e;">מוצר</th>
          <th style="width:100px;text-align:center;padding:8px 10px;background:#f5f0e8;font-size:12px;border-bottom:2px solid #c8a96e;">קטגוריה</th>
          <th style="width:70px;text-align:center;padding:8px 10px;background:#f5f0e8;font-size:12px;border-bottom:2px solid #c8a96e;">נשאר</th>
          <th style="width:60px;text-align:center;padding:8px 10px;background:#f5f0e8;font-size:12px;border-bottom:2px solid #c8a96e;">תוקף</th>
          <th style="width:70px;text-align:center;padding:8px 10px;background:#f5f0e8;font-size:12px;border-bottom:2px solid #c8a96e;">אריזה</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <style>@media print{button{display:none!important}}</style>`;

  // Store original for restore
  window._eodOrigBody = origBody;
  window._eodOrigTitle = origTitle;
}

function restoreEOD(){
  if(window._eodOrigBody){
    document.body.innerHTML = window._eodOrigBody;
    document.title = window._eodOrigTitle || 'סוף יום';
  }
}



</script>
</body>
