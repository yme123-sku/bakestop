function confirmImport(){
  var p = pendingImport;
  if(!p) return;
  var mappings = loadMappings();
  var written  = 0;

  // Read all dropdowns
  var selects = document.querySelectorAll('[data-row-idx]');
  selects.forEach(function(sel){
    var pid     = sel.value;
    var csvName = sel.getAttribute('data-csv-name');
    var qty     = parseFloat(sel.getAttribute('data-qty')) || 0;
    var date    = sel.getAttribute('data-date') || p.date;
    var sheet   = sel.getAttribute('data-sheet') || '';
    if(!pid) return; // "לא לייבא"

    var product = state.products.find(function(pr){ return String(pr.id)===pid; });
    if(!product) return;

    // Save mapping for future imports
    mappings[csvName] = pid;

    if(p.type === 'csv'){
      if(qty !== null && qty !== undefined){
        syncProductStock(product, qty);
        state.endDays = state.endDays.filter(function(r){
          return !(Number(r.productId)===Number(product.id) && r.date===date);
        });
        state.endDays.push({ id:uid(), productId:product.id, date:date, qty:qty });
      }
    } else {
      // Detect if this xlsx sheet is an EOD file (sheet name contains 'סוף יום')
      var isEODSheet = p.isEOD === true; // detected from header row
      if(isEODSheet){
        // Route to endDays
        if(product.noCarryover){ written--; return; } // skip — goes to transform
        syncProductStock(product, qty, 'סוף יום חנות');
        state.endDays = state.endDays.filter(function(r){
          return !(Number(r.productId)===Number(product.id) && r.date===date);
        });
        state.endDays.push({ id:uid(), productId:product.id, date:date, qty:qty, remaining:qty, note:'xlsx:'+sheet });
      } else {
        // Route to orders (הזמנות)
        state.orders = state.orders.filter(function(o){
          return !(Number(o.productId)===Number(product.id) && o.date===date
            && (o.note||'').indexOf('xlsx')!==-1);
        });
        state.orders.push({ id:uid(), productId:product.id, date:date, qty:qty, note:'xlsx:'+sheet });
      }
    }
    written++;
  });

  saveMappings(mappings);

  // Save unselected rows as variants
  var newVariants = [];
  document.querySelectorAll('[data-row-idx]').forEach(function(sel){
    if(sel.value) return; // was imported
    var name = sel.getAttribute('data-csv-name');
    var qty  = sel.getAttribute('data-qty');
    var date = sel.getAttribute('data-date') || p.date;
    var src  = p.type==='xlsx' ? 'xlsx — '+p.date : 'csv — '+p.date;
    // avoid duplicates
    var exists = (state.variants||[]).some(function(v){ return v.name===name && v.date===date; });
    if(!exists && name){
      newVariants.push({ id:uid(), name:name, qty:qty||null, date:date, source:src });
    }
  });
  if(newVariants.length){
    if(!state.variants) state.variants = [];
    state.variants = state.variants.concat(newVariants);
  }

  save();
  render();
  document.getElementById('preview-overlay').remove();
  pendingImport = null;
  toast('✓ ייבוא הושלם — '+written+' מוצרים'+(newVariants.length?' | '+newVariants.length+' נשמרו לשונות':''));
}

var _reportsCache = { date: null, eod: null, productions: [], finishing: [] };

function reportsView(){
  const selDate = ui.reportsDate || iso();
  const cache   = _reportsCache;
  const isLoaded = cache.date === selDate;

  // Build timeline from cache
  let timelineHtml = '';
  if(!isLoaded){
    timelineHtml = `<div style="text-align:center;padding:40px;color:var(--muted);">
      <div style="font-size:28px;margin-bottom:10px;">📋</div>
      <div style="font-size:14px;font-weight:600;">בחר תאריך ולחץ טען</div>
    </div>`;
  } else {
    const allEvents = [];

    // EOD event
    if(cache.eod){
      const e = cache.eod;
      const entries = (e.entries||[]).filter(function(x){ return x.qty > 0; });
      allEvents.push({
        ts: e.submitted_at||'', type:'eod', icon:'📋',
        title:'סוף יום — חנות',
        worker: 'חנות',
        color:'#15803d', bg:'#f0fdf4', border:'#bbf7d0',
        entries: entries.map(function(x){ return {name:x.name, qty:x.qty, unit:'יח\''}; }),
        count: entries.length
      });
    }

    // Baker productions
    cache.productions.forEach(function(r){
      const entries = (r.entries||[]).filter(function(x){ return Number(x.qty||0) > 0; });
      allEvents.push({
        ts: r.submitted_at||'', type:'baker', icon:'🥐',
        title:'ייצור — ' + (r.worker||'?'),
        worker: r.worker||'',
        color:'#b45309', bg:'#fffbeb', border:'#fde68a',
        entries: entries.map(function(x){ return {name:x.name, qty:x.qty, unit:x.unit||'יח\''}; }),
        count: entries.length,
        id: r.id
      });
    });

    // Finishing reports
    cache.finishing.forEach(function(r){
      const entries = (r.entries||[]).filter(function(x){ return Number(x.qty||0) > 0; });
      allEvents.push({
        ts: r.submitted_at||'', type:'finishing', icon:'✂️',
        title:'הוצאה — ' + (r.worker||'?'),
        worker: r.worker||'',
        color:'#7c3aed', bg:'#f5f3ff', border:'#ddd6fe',
        entries: entries.map(function(x){ return {name:x.name, qty:x.qty, dest:x.dest||'', unit:'יח\''}; }),
        count: entries.length,
        id: r.id
      });
    });

    // Sort by time desc
    allEvents.sort(function(a,b){ return b.ts.localeCompare(a.ts); });

    if(!allEvents.length){
      timelineHtml = `<div style="text-align:center;padding:40px;color:var(--muted);">
        <div style="font-size:28px;margin-bottom:10px;">📭</div>
        <div style="font-size:14px;">אין דוחות לתאריך זה</div>

      const FORM_LABELS = { eod:'טופס סוף יום', baker:'טופס ייצור', finishing:'טופס הוצאה' };
      timelineHtml = allEvents.map(function(ev){
        const time    = ev.ts ? ev.ts.slice(11,16) : '';
        const dateStr = ev.ts ? ev.ts.slice(0,10)  : selDate;
        const formLabel = FORM_LABELS[ev.type] || ev.type;
        const entriesHtml = ev.entries.map(function(e){
          const dest = e.dest ? ` <span style="color:#94a3b8;">→ ${escHtml(e.dest)}</span>` : '';

            <span style="color:#374151;">${escHtml(e.name)}${dest}</span>
            <span style="font-weight:800;color:${ev.color};font-family:monospace;">${e.qty} <span style="font-weight:400;color:#94a3b8;">${e.unit}</span></span>
          </div>`;

        return `<div style="background:${ev.bg};border:1px solid ${ev.border};border-right:4px solid ${ev.color};border-radius:10px;margin-bottom:12px;overflow:hidden;">
          <div style="padding:10px 14px;display:flex;align-items:flex-start;gap:10px;">
            <span style="font-size:20px;line-height:1.2;">${ev.icon}</span>
            <div style="flex:1;min-width:0;">
              <div style="font-size:11px;font-weight:800;color:${ev.color};text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;">${formLabel}</div>
              <div style="font-size:14px;font-weight:800;color:#1a2332;">${escHtml(ev.worker||'?')}</div>
              <div style="font-size:11px;color:#6b7a8d;margin-top:2px;">
                <span>📅 ${dateStr}</span>
                <span style="margin-right:8px;">⏱ ${time}</span>
                <span style="margin-right:8px;">📦 ${ev.count} פריטים</span>
              </div>
            </div>
            <button onclick="printSingleReport('${ev.type}','${ev.ts}')" style="background:rgba(0,0,0,.07);border:none;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;white-space:nowrap;">🖨 הדפס</button>
          </div>
          ${entriesHtml ? `<div style="padding:0 14px 12px;">${entriesHtml}</div>` : ''}
        </div>`;
      }).join('');
    }
  }

  // ── Inventory Log section ──
  const invLog = (state.inventoryLog || []).slice(0, 100);
  const invLogHtml = invLog.length ? invLog.map(function(e){
    const shelfArrow = e.shelfDelta > 0 ? '+'+e.shelfDelta : (e.shelfDelta < 0 ? e.shelfDelta : '');
    const baseArrow  = e.baseDelta  > 0 ? '+'+e.baseDelta  : (e.baseDelta  < 0 ? e.baseDelta  : '');
    const color = (e.shelfDelta > 0 || e.baseDelta > 0) ? '#15803d' : '#dc2626';
    const time = utcToLocalFull(e.ts);
    return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;">
      <span style="flex:1;font-weight:600;">${escHtml(e.name)}</span>
      <span style="color:#6b7a8d;font-size:10px;min-width:80px;text-align:center;">${escHtml(e.source)}</span>
      <span style="font-family:monospace;min-width:60px;text-align:center;color:${color};font-weight:700;">${shelfArrow||baseArrow||'0'}</span>
      <span style="color:#94a3b8;font-size:10px;min-width:90px;text-align:left;font-family:monospace;">${time}</span>
    </div>`;
  }).join('') : '<div style="text-align:center;padding:16px;color:var(--muted);font-size:13px;">אין היסטוריה עדיין</div>';

  return `<div class="page">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
      <div style="font-size:15px;font-weight:800;flex:1;">📋 דוחות</div>
      <input type="date" id="reports-date-sel" value="${selDate}"
        style="border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;"
        onchange="ui.reportsDate=this.value;loadReports(true);">
      <button onclick="loadReports(true)" style="background:var(--primary);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;">טען</button>
      ${isLoaded ? `<button onclick="printDailyReport('${selDate}')" style="background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;">🖨 הכל</button>` : ''}
    </div>
    ${isLoaded ? `<div style="font-size:11px;color:var(--muted);margin-bottom:12px;background:var(--surface2);border-radius:7px;padding:6px 10px;">
      ${fmtDate(selDate)} &nbsp;·&nbsp; EOD: ${cache.eod ? '✅ '+utcToLocalTime(cache.eod.submitted_at) : '—'}
      &nbsp;·&nbsp; ייצור: ${cache.productions.length} &nbsp;·&nbsp; הוצאה: ${cache.finishing.length}
    </div>` : ''}
    ${timelineHtml}

    <div style="margin-top:18px;">
      <div style="font-size:13px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:8px;">
        📦 לוג שינויי מלאי
        <span style="font-size:10px;font-weight:600;color:var(--muted);background:var(--surface2);padding:2px 7px;border-radius:5px;">${invLog.length} רשומות</span>
        ${invLog.length ? `<button onclick="if(confirm('למחוק את כל הלוג?')){state.inventoryLog=[];save();render();}" style="margin-right:auto;background:none;border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--muted);cursor:pointer;">נקה</button>` : ''}
      </div>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;">
        <div style="display:flex;gap:8px;padding-bottom:5px;margin-bottom:4px;border-bottom:2px solid var(--border);font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;">
          <span style="flex:1;">מוצר</span>
          <span style="min-width:60px;text-align:center;">מקור</span>
          <span style="min-width:60px;text-align:center;">שינוי</span>
          <span style="min-width:90px;text-align:left;">זמן</span>
        </div>
        ${invLogHtml}
      </div>
    </div>
  </div>`;
}


function doSyncThenLoad(){
  // Try to connect then load reports
  fetch(SB_URL+'/rest/v1/condit_state?id=eq.main&select=id',{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  }).then(function(){
    window._sbReady = true;
    loadReports(true);
  }).catch(function(){
    toast('שגיאה: אין חיבור לענן');
  });
}

async function loadReports(force){
  const date = ui.reportsDate || iso();
  toast('⏳ טוען דוחות...');
  try {
    // Fetch EOD
    const eodRes = await fetch(SB_URL+'/rest/v1/condit_eod?date=eq.'+date+'&order=submitted_at.desc&limit=1',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    const eodRows = await eodRes.json();

    // Fetch all productions for this date
    const prRes = await fetch(SB_URL+'/rest/v1/condit_productions?date=eq.'+date+'&order=submitted_at.asc',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    const prRows = await prRes.json();

    _reportsCache = {
      date:        date,
      eod:         (eodRows&&eodRows.length) ? eodRows[0] : null,
      productions: (prRows||[]).filter(function(r){ return r.role==='baker'; }),
      finishing:   (prRows||[]).filter(function(r){ return r.role==='finishing'; })
    };

    // Refresh only the content shell — NOT full render() which resets ui.reportsDate
    var shell = document.getElementById('content-shell');
    if(shell && ui.view === 'reports'){
      shell.innerHTML = reportsView();
      attachContentEvents();
    }
    toast('✓ ' + (prRows||[]).length + ' דוחות נטענו');
  } catch(e){
    console.error(e);
    toast('⚠ שגיאה בטעינת דוחות');
  }
}

// ── PRINT HELPER — mobile-safe, no window.open ──
function _doPrint(innerHtml){
  // Use hidden iframe — most reliable on Android Chrome (including content:// URLs)
  var old = document.getElementById('__print_frame');
  if(old) old.remove();

  var iframe = document.createElement('iframe');
  iframe.id = '__print_frame';
  iframe.style.cssText = 'position:fixed;top:0;left:0;width:0;height:0;border:none;opacity:0;pointer-events:none;';
  document.body.appendChild(iframe);

  var doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open();
  doc.write('<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8">'
    + '<style>'
    + '*{box-sizing:border-box;margin:0;padding:0;}'
    + 'body{font-family:Arial,sans-serif;font-size:12px;color:#111;direction:rtl;padding:12px;}'
    + 'table{width:100%;border-collapse:collapse;}'
    + 'th,td{padding:4px 8px;text-align:right;}'
    + 'th{background:#f5f5f5;font-size:11px;font-weight:800;}'
    + '</style>'
    + '</head><body>' + innerHtml + '</body></html>');
  doc.close();

  iframe.onload = function(){
    try {
      iframe.contentWindow.focus();
      iframe.contentWindow.print();
    } catch(e){ window.print(); }
    setTimeout(function(){ var f=document.getElementById('__print_frame'); if(f)f.remove(); }, 5000);
  };
}

// Print a single report card
function printSingleReport(type, ts){
  var cache = _reportsCache;
  var ev = null;
  if(type==='eod') ev=cache.eod;
  else if(type==='baker')    ev=cache.productions.find(function(r){return r.submitted_at===ts;});
  else if(type==='finishing') ev=cache.finishing.find(function(r){return r.submitted_at===ts;});
  if(!ev){ toast('לא נמצא הדוח'); return; }
  var LABELS={eod:'טופס סוף יום',baker:'טופס ייצור',finishing:'טופס הוצאה'};
  var COLORS={eod:'#15803d',baker:'#b45309',finishing:'#7c3aed'};
  var time=(ev.submitted_at||'').slice(0,16).replace('T',' ');
  var worker=ev.worker||(type==='eod'?'חנות':'?');
  var entries=(ev.entries||[]).filter(function(e){return Number(e.qty||0)>0;});
  var color=COLORS[type]||'#111';
  var rows=entries.map(function(e){
    var destCell=type==='finishing'?'<td style="padding:4px 8px;border-bottom:1px solid #eee;color:#888;">'+(e.dest||'חנות')+'</td>':'';
    return '<tr><td style="padding:4px 8px;border-bottom:1px solid #eee;">'+escHtml(e.name||'')+'</td>'+destCell+'<td style="padding:4px 8px;border-bottom:1px solid #eee;text-align:center;font-weight:800;color:'+color+';">'+e.qty+'</td><td style="padding:4px 8px;border-bottom:1px solid #eee;text-align:center;color:#888;font-size:11px;">'+(e.unit||"יח'")+'</td></tr>';
  }).join('');
  var destHeader=type==='finishing'?'<th style="padding:6px 8px;background:#f5f5f5;">יעד</th>':'';
  _doPrint('<div style="padding:16px;"><div style="font-size:10px;font-weight:800;color:'+color+';text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">'+LABELS[type]+'</div><div style="font-size:17px;font-weight:800;margin-bottom:2px;">'+escHtml(worker)+'</div><div style="font-size:11px;color:#777;margin-bottom:16px;">שליחה: '+time+' &nbsp;·&nbsp; '+entries.length+' פריטים</div><table style="width:100%;border-collapse:collapse;"><thead><tr><th style="text-align:right;padding:6px 8px;background:#f5f5f5;font-size:11px;">מוצר</th>'+destHeader+'<th style="padding:6px 8px;background:#f5f5f5;font-size:11px;width:60px;text-align:center;">כמות</th><th style="padding:6px 8px;background:#f5f5f5;font-size:11px;width:50px;text-align:center;">יחידה</th></tr></thead><tbody>'+rows+'</tbody></table></div>');
}

function printDailyReport(date){
  var cache=_reportsCache;
  if(cache.date!==date){ toast('טען קודם את הדוח'); return; }
  var dayHe=fmtDate(date);
  var printTime=new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});

  function eodHtmlBuild(){
    if(!cache.eod) return '<div style="color:#9ca3af;font-size:12px;">אין דוח EOD</div>';
    var cats={};
    (cache.eod.entries||[]).forEach(function(e){ var c=e.category||'כללי'; if(!cats[c])cats[c]=[]; cats[c].push(e); });
    return Object.keys(cats).map(function(cat){
      return '<div style="font-size:10px;font-weight:800;color:#555;margin:6px 0 3px;text-transform:uppercase;">'+cat+'</div>'
        +cats[cat].map(function(e){ return '<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #f0f0f0;font-size:12px;"><span style="color:'+(e.qty>0?'#111':'#9ca3af')+';">'+escHtml(e.name||'')+'</span><span style="font-weight:700;color:'+(e.qty>0?'#15803d':'#9ca3af')+'">'+(e.qty>0?e.qty:'—')+'</span></div>'; }).join('');
    }).join('');
  }

  function bakerHtmlBuild(){
    if(!cache.productions.length) return '<div style="color:#9ca3af;font-size:12px;">אין דוחות ייצור</div>';
    return cache.productions.map(function(r){
      var t=utcToLocalTime(r.submitted_at||'');
      var ents=(r.entries||[]).filter(function(e){return Number(e.qty||0)>0;});
      return '<div style="margin-bottom:10px;"><div style="font-size:11px;font-weight:800;color:#b45309;margin-bottom:3px;">'+(r.worker||'?')+' · '+t+'</div>'+ents.map(function(e){return '<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #f0f0f0;font-size:12px;"><span>'+escHtml(e.name||'')+'</span><span style="font-weight:700;">'+e.qty+' '+(e.unit||"יח'")+'</span></div>';}).join('')+'</div>';
    }).join('');
  }

  function finHtmlBuild(){
    if(!cache.finishing.length) return '<div style="color:#9ca3af;font-size:12px;">אין דוחות הוצאה</div>';
    var byDest={};
    cache.finishing.forEach(function(r){
      var t=utcToLocalTime(r.submitted_at||'');
      (r.entries||[]).forEach(function(e){
        if(!Number(e.qty||0)) return;
        var d=e.dest||'חנות'; if(!byDest[d])byDest[d]=[];
        byDest[d].push({name:e.name,qty:e.qty,worker:r.worker||'?',time:t});
      });
    });
    return Object.keys(byDest).map(function(dest){
      return '<div style="margin-bottom:10px;"><div style="font-size:11px;font-weight:800;color:#7c3aed;margin-bottom:3px;">→ '+escHtml(dest)+'</div>'+byDest[dest].map(function(e){return '<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #f0f0f0;font-size:12px;"><span>'+escHtml(e.name)+' <span style="color:#9ca3af;font-size:10px;">('+e.worker+' '+e.time+')</span></span><span style="font-weight:700;">'+e.qty+'</span></div>';}).join('')+'</div>';
    }).join('');
  }

  _doPrint('<div style="padding:12px;"><div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #111;padding-bottom:8px;margin-bottom:14px;"><div><div style="font-size:17px;font-weight:800;">📋 דוח יומי — קונדיטוריה</div><div style="font-size:12px;color:#555;margin-top:2px;">'+dayHe+'</div></div><div style="font-size:11px;color:#777;">הודפס: '+printTime+'<br>ייצור: '+cache.productions.length+' · הוצאה: '+cache.finishing.length+'</div></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;"><div style="border:1.5px solid #e5e7eb;border-top:3px solid #15803d;border-radius:6px;padding:10px;"><div style="font-size:13px;font-weight:800;color:#15803d;border-bottom:2px solid #15803d;padding-bottom:6px;margin-bottom:8px;">📋 סוף יום</div>'+eodHtmlBuild()+'</div><div style="border:1.5px solid #e5e7eb;border-top:3px solid #b45309;border-radius:6px;padding:10px;"><div style="font-size:13px;font-weight:800;color:#b45309;border-bottom:2px solid #b45309;padding-bottom:6px;margin-bottom:8px;">🥐 ייצור</div>'+bakerHtmlBuild()+'</div><div style="border:1.5px solid #e5e7eb;border-top:3px solid #7c3aed;border-radius:6px;padding:10px;"><div style="font-size:13px;font-weight:800;color:#7c3aed;border-bottom:2px solid #7c3aed;padding-bottom:6px;margin-bottom:8px;">✂️ הוצאה</div>'+finHtmlBuild()+'</div></div></div>');
}

function forecastCalc(p, days){
  var results = [];
  var bufPct  = num(p.buffer, 25) / 100;

  // Detect stock type:
  // baseStock > 0 OR shelfStock === 0 → daily production item (resets each day)
  // shelfStock > 0 → shelf item (stock carries forward)
  var isBase = (num(p.baseStock) > 0) || (num(p.shelfStock) === 0 && num(p.baseStock) > 0);
  // Simpler: if baseStock field exists and > 0 → base type
  var baseQty  = num(p.baseStock, 0);
  var shelfQty = num(p.shelfStock, num(p.stock, 0));

  // Running shelf stock (carries forward day to day)
  var shelfStock = shelfQty;

  days.forEach(function(date){
    // Known orders for this date
    var ordersQty = state.orders
      .filter(function(o){ return Number(o.productId)===Number(p.id) && o.date===date; })
      .reduce(function(s,o){ return s + num(o.qty); }, 0);

    // Actual production recorded for this date
    var prodQty = state.productions
      .filter(function(r){ return Number(r.productId)===Number(p.id) && r.date===date; })
      .reduce(function(s,r){ return s + num(r.qty); }, 0);

    // Daily burn rate
    var burnQty = num(p.burn, 0);

    // Demand calculation
    var demand;
    if(p.demandMode === 'orders')    demand = ordersQty;
    else if(p.demandMode === 'burn') demand = burnQty;
    else                              demand = Math.max(ordersQty, burnQty); // hybrid

    // Buffer scales with demand
    var buffer = Math.ceil(demand * bufPct);
    var target  = demand + buffer;

    var suggested, stockStart, stockEnd, displayStock;

    if(baseQty > 0){
      // ── BASE STOCK MODE ──
      // Fresh daily production. Stock doesn't carry forward.
      // Today: we have baseStock ready. Future: we need to produce from scratch.
      stockStart   = (date === days[0]) ? baseQty : 0;
      displayStock = stockStart;

      // demand already includes ordersQty for this specific date
      // Suggested = what needs to be produced to cover demand + buffer
      if(date === days[0]){
        // Today: subtract what's already ready
        suggested = Math.max(0, target - stockStart - prodQty);
      } else {
        // Future days: need to produce full demand + buffer
        suggested = Math.max(0, target - prodQty);
      }

      stockEnd = Math.max(0, stockStart - demand + prodQty);

    } else {
      // ── SHELF STOCK MODE ──
      // Stock accumulates and carries forward
      stockStart   = shelfStock;
      displayStock = stockStart;
      stockEnd     = Math.max(0, stockStart - demand + prodQty);

      suggested = Math.max(0, target - stockStart + demand - prodQty);
      if(stockStart >= target) suggested = 0;

      // Carry forward
      shelfStock = stockEnd;
    }

    results.push({
      date:        date,
      stockStart:  Math.round(stockStart * 10) / 10,
      stockEnd:    Math.round(stockEnd   * 10) / 10,
      displayStock:Math.round(displayStock* 10) / 10,
      demand:      Math.round(demand  * 10) / 10,
      ordersQty:   Math.round(ordersQty * 10) / 10,
      burnQty:     Math.round(burnQty * 10) / 10,
      prodQty:     Math.round(prodQty * 10) / 10,
      buffer:      buffer,
      target:      target,
      suggested:   Math.round(suggested * 10) / 10,
      isBase:      baseQty > 0,
    });
  });
  return results;
}

function forecastView(){
  var DAYS    = 7;
  var dates   = [];
  var labels  = ['היום','מחר','יום ג\'','יום ד\'','יום ה\'','יום ו\'','יום ז\''];
  var dayNames = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  var count = 0, offset = 0;
  while(count < DAYS){
    var d = addDays(new Date(), offset);
    offset++;
    if(d.getDay() === 6) continue; // skip Saturday
    var label = count===0 ? 'היום' : count===1 ? 'מחר' : dayNames[d.getDay()];
    dates.push(iso(d));
    labels[count] = label;
    count++;
  }

  // Filter: only products with stock or orders in horizon
  var relevant = state.products.filter(function(p){
    if(num(p.stock) > 0) return true;
    if(num(p.baseStock) > 0) return true;
    if(num(p.shelfStock) > 0) return true;
    if(num(p.burn) > 0) return true; // has daily burn — show in forecast
    return state.orders.some(function(o){
      return Number(o.productId)===Number(p.id) && o.date >= dates[0] && o.date <= dates[DAYS-1];
    });
  });

  if(!relevant.length){
    return '<div style="text-align:center;padding:60px 20px;color:#94a3b8;">'
      + '<div style="font-size:36px;margin-bottom:12px">📊</div>'
      + '<div style="font-size:16px;color:#1a2332;font-weight:600;">אין נתונים לתחזית</div>'
      + '<div style="font-size:12px;margin-top:8px;">הוסף מוצרים עם מלאי או ייבא הזמנות</div>'
      + '</div>'
  }

  // Summary row: total suggested production per day
  var daySums = dates.map(function(){ return 0; });
  relevant.forEach(function(p){
    var fc = forecastCalc(p, dates);
    fc.forEach(function(d,i){ daySums[i] += d.suggested; });
  });

  // Header
  var colW = 'min-width:58px;max-width:70px;';
  var hCells = '<th style="text-align:right;padding:8px 12px;font-size:12px;color:#6b7a8d;font-weight:600;white-space:nowrap;">מוצר</th>';
  dates.forEach(function(d, i){
    var isToday   = i===0;
    var hasSugg   = daySums[i] > 0;
    hCells += '<th style="'+colW+'text-align:center;padding:8px 4px;font-size:11px;font-weight:700;'
      + (isToday ? 'color:#2563eb;' : 'color:#6b7a8d;') + '">'
      + labels[i]
      + '<div style="font-size:9px;font-weight:400;color:#94a3b8;">'+fmtDate(d).split(',')[0]+'</div>'
      + '</th>';
  });

  // Product rows
  var rows = '';
  relevant.forEach(function(p){
    var fc = forecastCalc(p, dates);
    rows += '<tr style="border-bottom:1px solid #f1f5f9;">';
    var isBaseP = num(p.baseStock) > 0;
    rows += '<td style="padding:8px 12px;font-size:13px;font-weight:600;color:#1a2332;white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis;">'
      + escHtml(p.name)
      + '<div style="margin-top:3px;display:flex;gap:3px;">'
      + (isBaseP
          ? '<span style="font-size:9px;background:#eff6ff;color:#2563eb;padding:1px 5px;border-radius:3px;font-weight:600;">בסיס '+num(p.baseStock)+'</span>'
          : '<span style="font-size:9px;background:#f0fdf4;color:#15803d;padding:1px 5px;border-radius:3px;font-weight:600;">מדף '+num(p.stock)+'</span>')
      + (num(p.burn)>0 ? '<span style="font-size:9px;background:#fefce8;color:#a16207;padding:1px 5px;border-radius:3px;">🔥'+num(p.burn)+'</span>' : '')
      + '</div>'
      + '</td>';

    fc.forEach(function(day, i){
      var sugg    = day.suggested;
      var stock   = day.stockStart;
      var demand  = day.demand;
      var isToday = i===0;

      // Color logic
      var bg='', color='', fw='400';
      if(sugg > 0){
        bg='#fef2f2'; color='#dc2626'; fw='800'; // need to produce
      } else if(stock >= day.target * 1.5){
        bg='#f0fdf4'; color='#15803d'; // surplus
      } else if(stock >= day.target){
        bg='#f8f9fb'; color='#6b7a8d'; // ok
      } else {
        bg='#fffbeb'; color='#d97706'; // borderline
      }

      rows += '<td style="'+colW+'text-align:center;padding:6px 4px;background:'+bg+';font-size:12px;font-weight:'+fw+';color:'+color+';">';
      if(sugg > 0){
        rows += '<div title="לייצר">⚡'+sugg+'</div>';
        if(day.isBase && i===0)
          rows += '<div style="font-size:9px;color:#94a3b8;font-weight:400;">בסיס:'+day.displayStock+'</div>';
        else if(!day.isBase)
          rows += '<div style="font-size:9px;color:#94a3b8;font-weight:400;">מדף:'+day.displayStock+'</div>';
      } else {
        rows += '<div>'+day.displayStock+'</div>';
        if(demand > 0) rows += '<div style="font-size:9px;color:#94a3b8;">ביקוש:'+demand+'</div>';
      }
      rows += '</td>';
    });
    rows += '</tr>';
  });

  // Summary row
  var sumRow = '<tr style="background:#f8f9fb;border-top:2px solid #e2e6ec;">'
    + '<td style="padding:8px 12px;font-size:12px;font-weight:700;color:#1a2332;">סה"כ לייצור</td>';
  daySums.forEach(function(s, i){
    var hasWork = s > 0;
    sumRow += '<td style="'+colW+'text-align:center;padding:8px 4px;font-size:13px;font-weight:800;color:'

    + '<span style="background:#f8f9fb;color:#6b7a8d;padding:3px 8px;border-radius:4px;">· תקין</span>'

    + 'מלאי מחר = מלאי היום − ביקוש + ייצור בפועל<br>'
    + 'צפי ייצור = max(0, ביקוש + buffer − מלאי)<br>'
    + 'buffer = ' + (state.products[0] ? num(state.products[0].buffer,25) : 25) + '% מהביקוש (לפי מוצר)'
    + '</div>';

  var table = '<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">'
    + '<table style="width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);">'

// ═══════════════════════════════
//  PLANNING VIEW — תכנון מחר
// ═══════════════════════════════

function planningView(){
  var tomorrowOffset = 1;
  while(new Date(iso(addDays(new Date(),tomorrowOffset))+'T00:00:00').getDay()===6) tomorrowOffset++;
  var tomorrow    = iso(addDays(new Date(),tomorrowOffset));
  var tomorrowDay = new Date(tomorrow+'T00:00:00').getDay();
  var isFriday    = tomorrowDay===5;
  var dayLabel    = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'][tomorrowDay];
  var todayHe     = new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});

  // ── EOD data ──
  var lastEOD = null;
  if(state.eodHistory && state.eodHistory.length)
    lastEOD = state.eodHistory[state.eodHistory.length-1];
  var eodByProduct = {};
  if(lastEOD && lastEOD.entries)
    lastEOD.entries.forEach(function(e){ eodByProduct[e.id||e.productId] = num(e.qty); });

  // ── Orders ──
  var ordersByProduct = {};
  state.orders.filter(function(o){ return o.date===tomorrow; }).forEach(function(o){
    ordersByProduct[o.productId] = (ordersByProduct[o.productId]||0) + num(o.qty);
  });

  // ── Existing plan for tomorrow ──
  var plannedByProduct = {};
  state.productions.filter(function(r){ return r.date===tomorrow && r.note==='תכנון מחר'; })
    .forEach(function(r){ plannedByProduct[r.productId] = (plannedByProduct[r.productId]||0) + num(r.qty); });

  // ── Forecast: days until stockout ──
  function daysUntilOut(p, productionQty){
    var stock = Object.keys(eodByProduct).length
      ? (eodByProduct[p.id]!==undefined ? eodByProduct[p.id] : num(p.shelfStock))
      : num(p.shelfStock);
    stock += productionQty;
    var burn = num(p.dailyBurn) || num(p.minStock)/3 || 1;
    if(burn <= 0) return 99;
    return Math.floor(stock / burn);
  }

  function forecastLabel(days){
    if(days >= 7) return {text:'✓ 7+ ימים', color:'var(--success)'};
    if(days >= 4) return {text:'✓ '+days+' ימים', color:'var(--success)'};
    if(days >= 2) return {text:'⚠ '+days+' ימים', color:'var(--warning)'};
    return {text:'🔥 '+days+' יום', color:'var(--danger)'};
  }

  // ── Build rows grouped by dough family ──
  var families = {};
  state.products.filter(function(p){ return p.type!=='base'; }).forEach(function(p){
    var fid = p.doughFamily || '__other__';
    if(!families[fid]) families[fid] = [];
    families[fid].push(p);
  });

  var allFids = Object.keys(families).sort(function(a,b){
    // Known families first, in order
    var order = ['croissant','krantz','kasten','puff','quiche','__other__'];
    return order.indexOf(a) - order.indexOf(b);
  });

  // ── HTML rows for screen ──
  var screenRows = '';
  // ── Data for print ──
  var printRows  = '';
  var printTotals = {}; // familyId → {portions, kg}

  allFids.forEach(function(fid){
    var fam     = DOUGH_FAMILIES.find(function(f){ return f.id===fid; });
    var famName = fam ? fam.name : 'אחר';
    var famIcon = {croissant:'🥐',krantz:'🌀',kasten:'🍞',puff:'📄',quiche:'🥧'}[fid]||'📦';

    var totalProd = 0;

    // Section header
    screenRows += '<div style="font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.07em;'
      +'text-transform:uppercase;margin:14px 0 6px;display:flex;align-items:center;gap:6px;">'
      +famIcon+' '+famName+'</div>';

    printRows += '<tr class="fam-head"><td colspan="5">'+famIcon+' '+famName+'</td></tr>';

    families[fid].forEach(function(p){
      var eodQty  = eodByProduct[p.id]!==undefined ? eodByProduct[p.id] : num(p.shelfStock);
      var planned = plannedByProduct[p.id] || 0;
      var ordQty  = ordersByProduct[p.id] || 0;
      var minStock= num(p.minStock||0);
      var gap     = Math.max(0, minStock - eodQty);
      var suggest = gap > 0 ? Math.ceil(gap/5)*5 : 0;

      var days    = daysUntilOut(p, planned);
      var fc      = forecastLabel(days);

      var hasGap  = gap > 0;
      var hasOrd  = ordQty > 0;
      var inputBg = planned > 0 ? 'var(--primary-soft)' : hasGap ? 'var(--danger-soft)' : 'var(--surface2)';
      var inputBdr= planned > 0 ? 'var(--primary-border)' : hasGap ? 'var(--danger-border)' : 'var(--border)';
      var inputClr= planned > 0 ? 'var(--primary)' : hasGap ? 'var(--danger)' : 'var(--muted)';

      totalProd += planned;

      // Screen row
      screenRows += '<div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);">'
        +'<div style="flex:1;min-width:0;">'
        +'<div style="font-size:15px;font-weight:600;">'+escHtml(p.name)+'</div>'
        +'<div style="font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;">'
        +'<span>EOD: <b style="color:var(--text);">'+eodQty+'</b></span>'
        +'<span>מינ\': <b style="color:var(--text);">'+minStock+'</b></span>'
        +(hasOrd?'<span style="color:var(--primary);font-weight:700;">הזמ\': '+ordQty+'</span>':'')
        +'</div></div>'
        +'<div style="font-size:11px;font-weight:700;color:'+fc.color+';flex-shrink:0;text-align:center;min-width:52px;">'+fc.text+'</div>'
        +'<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;">'
        +'<input type="number" id="plan-'+p.id+'" min="0" inputmode="numeric" placeholder="0"'
        +' value="'+(planned||suggest||'')+'"'
        +' onchange="updatePlanTotals()" oninput="updatePlanTotals()"'
        +' style="width:68px;text-align:center;font-size:17px;font-weight:800;'
        +'border:2px solid '+inputBdr+';border-radius:10px;padding:7px 4px;'
        +'background:'+inputBg+';color:'+inputClr+';font-family:inherit;outline:none;">'
        +'<div style="font-size:10px;color:var(--muted);">יח\'</div>'
        +'</div></div>';

      // Print row
      var fcPrint = days>=4 ? '✓ '+days+'י' : days>=2 ? '⚠ '+days+'י' : '🔥 '+days+'י';
      printRows += '<tr>'
        +'<td class="prod-name">'+p.name+'</td>'
        +'<td class="num">'+eodQty+'</td>'
        +'<td class="num prod-col" id="print-'+p.id+'">'+( planned||suggest||'')+'</td>'
        +'<td class="num fc" style="color:'+(days>=4?'#15803d':days>=2?'#b45309':'#dc2626')+'">'+fcPrint+'</td>'
        +'<td class="num ord">'+(hasOrd?ordQty:'')+'</td>'
        +'</tr>';
    });

    // Dough total note
    if(fam && fam.defaultYield && totalProd > 0){
      var portions = Math.ceil(totalProd / fam.defaultYield);
      var kg       = Math.round(portions * (fam.portionKg||0) * 10) / 10;
      screenRows += '<div id="fam-total-'+fid+'" style="background:var(--primary-soft);border:1px solid var(--primary-border);'
        +'border-radius:8px;padding:7px 12px;margin:6px 0 10px;font-size:12px;color:var(--primary);font-weight:700;">'
        +'🫙 סה"כ '+famName+': '+totalProd+' יח\' → '+portions+' בצקים ('+kg+' ק"ג)'
        +'</div>';
      printTotals[fid] = {name:famName, portions, kg, total:totalProd};
    }
  });

  // ── Print totals rows ──
  var printTotalRows = Object.values(printTotals).map(function(t){
    return '<tr class="total-row"><td colspan="2">סה"כ '+t.name+'</td>'
      +'<td class="num">'+t.total+' יח\'</td>'
      +'<td colspan="2">'+t.portions+' בצקים · '+t.kg+' ק"ג</td></tr>';
  }).join('');

  // ── EOD banner ──
  var eodDate = lastEOD ? (lastEOD.date||'') : '';
  var eodBanner = '<div style="display:flex;align-items:center;gap:10px;'
    +'background:'+(eodDate?'var(--success-soft)':'var(--warning-soft)')+';'
    +'border:1px solid '+(eodDate?'var(--success-border)':'var(--warning-border)')+';'
    +'border-radius:10px;padding:9px 13px;margin-bottom:12px;font-size:12px;">'
    +'<span style="font-size:16px;">'+(eodDate?'🟢':'⚠️')+'</span>'
    +'<div style="flex:1;">'
    +'<b>'+(eodDate?'EOD: '+eodDate:'אין EOD')+'</b>'
    +'<span style="color:var(--muted);margin-right:6px;">'+(eodDate?'':'— מלאי נוכחי בלבד')+'</span>'
    +'</div>'
    +'<button onclick="readEODFromCloud()" style="background:var(--primary);color:#fff;border:none;'
    +'border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;">☁️ רענן</button>'
    +'</div>';

  // ── Print stylesheet + hidden print div ──
  var printSection = `
    <style id="print-style">
    @media print {
      body * { visibility: hidden !important; }
      #print-area, #print-area * { visibility: visible !important; }
      #print-area { position:fixed;top:0;left:0;width:100%;direction:rtl;font-family:Arial,sans-serif; }
    }
    #print-area { display:none; }
    </style>
    <div id="print-area">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;border-bottom:2px solid #111;padding-bottom:8px;">
        <div>
          <div style="font-size:20px;font-weight:800;">תכנון ייצור — ${dayLabel}</div>
          <div style="font-size:13px;color:#555;">${tomorrow} · ${todayHe}</div>
        </div>
        <div style="font-size:13px;text-align:left;color:#555;">
          <div>EOD: ${eodDate||'—'}</div>
          <div>הודפס: ${new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:14px;">
        <thead>
          <tr style="border-bottom:2px solid #111;">
            <th style="text-align:right;padding:5px 4px;font-size:12px;">מוצר</th>
            <th style="text-align:center;padding:5px 4px;font-size:12px;width:55px;">נשאר</th>
            <th style="text-align:center;padding:5px 4px;font-size:12px;width:65px;background:#f0f0f0;">ייצור</th>
            <th style="text-align:center;padding:5px 4px;font-size:12px;width:55px;">תחזית</th>
            <th style="text-align:center;padding:5px 4px;font-size:12px;width:50px;">הזמנה</th>
          </tr>
        </thead>
        <tbody id="print-tbody">
          ${printRows}
          ${printTotalRows}
        </tbody>
      </table>
      <div style="margin-top:16px;font-size:12px;color:#555;border-top:1px solid #ccc;padding-top:8px;">
        * עמודת "ייצור" — מלא לפי הנחיות הבוקר
      </div>
    </div>`;

  return printSection
    + '<div class="page">'

    + '<div style="background:var(--primary);color:#fff;border-radius:var(--radius);padding:13px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;">'
    + '<div>'
    + '<div style="font-size:11px;opacity:.7;text-transform:uppercase;letter-spacing:.07em;">תכנון ייצור</div>'
    + '<div style="font-size:20px;font-weight:800;letter-spacing:-.5px;">יום '+dayLabel+(isFriday?' 🎉':'')+' · '+tomorrow+'</div>'
    + '</div>'
    + '<button onclick="printPlan()" style="background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.35);'
    + 'color:#fff;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;">🖨 הדפס</button>'
    + '</div>'

    + eodBanner

    + '<div id="plan-screen-rows">'
    + screenRows
    + '</div>'

    + '<div id="plan-dough-summary" style="margin-top:4px;"></div>'

    + '<button onclick="planConfirm()" style="width:100%;padding:15px;background:var(--primary);color:#fff;'
    + 'border:none;border-radius:var(--radius);font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;'
    + 'margin-top:14px;box-shadow:0 4px 16px rgba(37,99,235,.28);">✓ אשר ושמור תכנון</button>'

    + '</div>'
}

  document.querySelectorAll('[id^="plan-"]').forEach(function(inp){
    var pid = inp.id.replace('plan-','');

    if(printCell) printCell.textContent = inp.value||'';

  window.print();

// ── PLAN CONFIRM ──
function planConfirm(){
  var tomorrowOffset = 1;
  while(new Date(iso(addDays(new Date(),tomorrowOffset))+'T00:00:00').getDay()===6) tomorrowOffset++;
  var tomorrow = iso(addDays(new Date(),tomorrowOffset));
  var moved = 0;

  // Read all plan-{id} inputs
  document.querySelectorAll('[id^="plan-"]').forEach(function(inp){
    var rawId = inp.id.replace('plan-','');
    var pid   = Number(rawId);
    if(!pid || isNaN(pid)) return;
    var qty = Number(inp.value||0);
    if(qty <= 0) return;
    var p = getProduct(pid);
    if(!p) return;
    // Remove existing plan entry for same product+date
    state.productions = state.productions.filter(function(r){
      return !(Number(r.productId)===pid && r.date===tomorrow && r.note==='תכנון מחר');
    });
    state.productions.push({ id:uid(), productId:pid, date:tomorrow, qty:qty, note:'תכנון מחר' });
    p.lastSource = 'תכנון מחר';
    moved++;
  });

  save(); render();
  toast('✓ תכנון נשמר — '+moved+' מוצרים');
}


async function readEODFromCloud(){
  // This is the PLANNING VIEW refresh — only updates lastEOD for planning display
  try {
    toast('⏳ מרענן נתוני EOD...');
    const res = await fetch(SB_URL + '/rest/v1/condit_eod?order=submitted_at.desc&limit=1', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    const rows = await res.json();
    if(!rows || !rows.length){ toast('אין דוח EOD בענן'); return; }
    const eod = rows[0];
    const date = eod.date || '';
    const isToday = date === iso();
    const subAt = eod.submitted_at ? utcToLocalTime(eod.submitted_at) : '';
    const entries = eod.entries || [];
    const filled = entries.filter(function(e){ return e.qty > 0; }).length;

    // Store for planning use without applying to inventory
    state._lastCloudEOD = eod;

    if(!isToday){
      toast('⚠ EOD אחרון מ-' + date + ' (לא היום) — תצוגה בלבד');
    } else {
      toast('✓ EOD עודכן — ' + date + ' שעה ' + subAt + ' · ' + filled + ' מוצרים');
    }
    render();
  } catch(e) {
    console.error(e);
    toast('⚠ שגיאה בקריאת EOD');
  }
}


// ── LIVE MONITOR ──
var _liveMonitorInterval = null;

async function checkLiveEOD(){
  try {
    const res = await fetch(SB_URL + '/rest/v1/condit_eod?order=submitted_at.desc&limit=1', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    const rows = await res.json();
    if(!rows || !rows.length) return;

    const eod     = rows[0];
    const eodTs   = eod.submitted_at || '';
    const date    = eod.date || '';
    const isToday = date === iso();
    const appliedTs = eodGetAppliedTs();
    const isApplied = !!(eodTs && eodTs === appliedTs);

    // ── AUTO-APPLY: new today EOD → apply immediately ──
    if(isToday && eodTs && !isApplied && eodTs !== _lastPromptedEODTs) {
      _lastPromptedEODTs = eodTs;
      try{ localStorage.setItem('condit_eod_last_prompted', eodTs); }catch(e){}
      doReadEOD();
    }
  } catch(e){ /* silent */ }
}

async function checkLiveProductions(){
  try {
    const today = iso();
    const res = await fetch(SB_URL + '/rest/v1/condit_productions?date=eq.'+today+'&order=submitted_at.desc', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    const rows = await res.json();
    if(!rows || !rows.length){ window._liveProductions = {}; }
    else {
      var baker = null, finishing = null;
      rows.forEach(function(r){
        if(r.role === 'baker' && !baker)
          baker = { date: r.date||today, ts: r.submitted_at||'' };
        if(r.role === 'finishing' && !finishing)
          finishing = { date: r.date||today, ts: r.submitted_at||'' };
      });
      window._liveProductions = { baker, finishing };
    }
    // Re-render board status strip if visible
    const strip = document.querySelector('.status-strip');
    if(strip && typeof ui !== 'undefined' && ui.view === 'board'){
      const content = document.getElementById('content-shell');
      if(content) content.innerHTML = boardView(totals());
      attachContentEvents();
    }
  } catch(e){ /* silent */ }
}

function startLiveMonitor(){
  checkLiveEOD();
  checkLiveProductions();
  if(_liveMonitorInterval) clearInterval(_liveMonitorInterval);
  _liveMonitorInterval = setInterval(function(){ checkLiveEOD(); checkLiveProductions(); }, 30000);
}

function stopLiveMonitor(){
  // Keep running - strip is always visible in header
  // Only stop if truly leaving the app
}

  .then(function(rows){
    if(!rows||!rows.length){
      overlay.querySelector('div>div').innerHTML='<div style="width:40px;height:4px;background:#e2e6ec;border-radius:2px;margin:0 auto 16px;"></div><div style="text-align:center;padding:30px;color:#6b7a8d;">אין דוח בענן</div><button onclick="document.getElementById(\'eod-overlay\').remove()" style="width:100%;padding:12px;background:#f0f2f5;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;">סגור</button>';
      return;
    }
    var eod=rows[0],entries=eod.entries||[];
    var date=eod.date||'',subAt=eod.submitted_at?utcToLocalFull(eod.submitted_at):'';
    var dateHe=date?new Date(date+'T00:00:00').toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'}):'';
    entries.sort(function(a,b){return (a.category||'').localeCompare(b.category||'','he')||(a.name||'').localeCompare(b.name||'','he');});
    var lastCat='',rows2=entries.map(function(e){
      var ch='';
      if(e.category!==lastCat){lastCat=e.category;ch='<div style="font-size:10px;font-weight:800;color:#6b7a8d;letter-spacing:.8px;text-transform:uppercase;margin:10px 0 4px;padding-right:4px;border-right:3px solid #2563eb;">'+escHtml(e.category||'')+'</div>';}
      var q=Number(e.qty||0),c=q===0?'#16a34a':q<=2?'#dc2626':'#1a2332';
      return ch+'<div style="display:flex;justify-content:space-between;padding:6px 4px;border-bottom:1px solid #f0f2f5;"><span style="font-size:13px;font-weight:600;">'+escHtml(e.name||'')+'</span><span style="font-size:15px;font-weight:800;color:'+c+';">'+q+'</span></div>';
    }).join('');
    overlay.querySelector('div>div').innerHTML='<div style="width:40px;height:4px;background:#e2e6ec;border-radius:2px;margin:0 auto 16px;"></div>'
      +'<div style="margin-bottom:14px;"><div style="font-size:17px;font-weight:800;">📋 דוח סוף יום</div><div style="font-size:12px;color:#6b7a8d;margin-top:2px;">'+dateHe+'</div><div style="font-size:11px;color:#2563eb;font-weight:600;margin-top:2px;">⏱ נקלט: '+subAt+'</div></div>'
      +'<div style="max-height:50vh;overflow-y:auto;margin-bottom:14px;">'+rows2+'</div>'
      +'<div style="display:flex;gap:8px;">'
      +'<button onclick="document.getElementById(\'eod-overlay\').remove()" style="flex:1;padding:12px;background:#f0f2f5;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">סגור</button>'
      +'</div>';
  }).catch(function(){toast('⚠ שגיאה בטעינה');});
}

// ═══════════════════════════════
//  UPDATE LOG
// ═══════════════════════════════
function logUpdate(entry){
  if(!state.updateLog) state.updateLog = [];
  state.updateLog.unshift(entry); // newest first
  if(state.updateLog.length > 50) state.updateLog = state.updateLog.slice(0,50);
}

function updateLogId(type){
  var now = new Date();
  var hh  = now.getHours().toString().padStart(2,'0');
  var mm  = now.getMinutes().toString().padStart(2,'0');
  var ss  = now.getSeconds().toString().padStart(2,'0');
  return type.toUpperCase() + '-' + iso().replace(/-/g,'').slice(2) + '-' + hh + mm + ss;
}

function updateLogView(){
  var log = (state.updateLog || []).slice(0, 10);
  if(!log.length){
    return '<div style="text-align:center;padding:20px;color:#94a3b8;font-size:13px;">אין עדכונים עדיין</div>';
  }
  return log.map(function(e){
    var icon   = {eod:'📥', production:'🔥', baking:'🥐', morning:'🌅', manual:'✏️', transform:'🔁', csv:'📄'}[e.type] || '📋';
    var sColor = e.status==='ok' ? '#15803d' : e.status==='partial' ? '#b45309' : '#dc2626';
    var sBg    = e.status==='ok' ? '#f0fdf4' : e.status==='partial' ? '#fffbeb' : '#fef2f2';
    var sBdr   = e.status==='ok' ? '#bbf7d0' : e.status==='partial' ? '#fde68a' : '#fecaca';
    var sLabel = e.status==='ok' ? '✓ הצלחה' : e.status==='partial' ? '⚠ חלקי' : '✕ שגיאה';
    var timeStr = e.ts ? e.ts.slice(11,16) : '';
    var dateStr = e.ts ? e.ts.slice(0,10) : '';

    var errHtml = '';
    if(e.errors && e.errors.length){
      errHtml = '<div style="margin-top:5px;font-size:11px;color:#dc2626;">'
        + e.errors.slice(0,3).map(function(err){ return '• '+escHtml(err); }).join('<br>')
        + (e.errors.length>3 ? '<br>ועוד '+(e.errors.length-3)+'...' : '')
        + '</div>';
    }

    return '<div style="background:#fff;border:1px solid var(--border);border-right:3px solid '+sColor+';'
      + 'border-radius:10px;padding:10px 12px;margin-bottom:6px;">'
      + '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">'
      + '<div style="flex:1;">'
      + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">'
      + '<span style="font-size:14px;">'+icon+'</span>'
      + '<span style="font-size:12px;font-weight:800;color:var(--text);">'+escHtml(e.source||e.type)+'</span>'
      + '</div>'
      + '<div style="font-size:10px;color:#94a3b8;font-family:monospace;letter-spacing:.04em;">'+escHtml(e.id||'')+'</div>'
      + errHtml
      + '</div>'
      + '<div style="text-align:left;flex-shrink:0;">'
      + '<div style="font-size:11px;font-weight:800;background:'+sBg+';color:'+sColor+';border:1px solid '+sBdr+';'
      + 'padding:2px 7px;border-radius:5px;margin-bottom:4px;">'+sLabel+'</div>'
      + '<div style="font-size:11px;color:#94a3b8;text-align:left;">'
      + (e.count !== undefined ? e.count+' מוצרים' : '')
      + (e.skipped ? ' · '+e.skipped+' דולגו' : '')
      + '</div>'
      + '<div style="font-size:10px;color:#cbd5e1;text-align:left;">'+timeStr+' · '+dateStr+'</div>'
      + '</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

function doReadEOD(){
  // Dismiss any lingering banners

  // Show prominent loading banner immediately — user sees something happening
  var existing = document.getElementById('eod-success-banner');
  if(existing) existing.remove();
  var loadBanner = document.createElement('div');
  loadBanner.id = 'eod-loading-banner';
  loadBanner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:150;'
    + 'background:#eff6ff;border-bottom:2px solid #2563eb;padding:12px 14px;'
    + 'display:flex;align-items:center;gap:10px;font-size:14px;direction:rtl;font-weight:700;color:#1d4ed8;';
  loadBanner.innerHTML = '<span style="font-size:18px;">⏳</span> מעדכן מלאי מהענן...';
  document.body.appendChild(loadBanner);

  var updateId = updateLogId('EOD');

  fetch(SB_URL+'/rest/v1/condit_eod?order=submitted_at.desc&limit=1',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}})
  .then(function(r){
    if(!r.ok) throw new Error('HTTP ' + r.status + ' — ' + r.statusText);
    return r.json();
  })
  .then(function(rows){
    var lb = document.getElementById('eod-loading-banner');
    if(lb) lb.remove();

    if(!rows || !rows.length){
      logUpdate({id:updateId, type:'eod', ts:isoTime(), source:'EOD חנות', status:'error', count:0, errors:['לא נמצא דוח בענן']});
      save();
      showEODSuccessBanner(updateId, 0, 0, ['לא נמצא דוח בענן'], '', 'error');
      checkLiveEOD();
      return;
    }

    var eod = rows[0], date = eod.date, entries = eod.entries || [];
    var subAt = eod.submitted_at ? utcToLocalTime(eod.submitted_at) : '';
    var updated = 0, skipped = 0, errors = [];

    entries.forEach(function(e){
      try {
        var p = state.products.find(function(p){ return String(p.id)===String(e.id) || p.name===e.name; });
        if(!p){ errors.push('לא זוהה: ' + (e.name||e.id)); return; }
        if(p.noCarryover){ skipped++; return; }
        syncProductStock(p, e.qty, 'EOD ' + subAt);
        state.endDays = state.endDays.filter(function(r){ return !(Number(r.productId)===Number(p.id) && r.date===date); });
        state.endDays.push({id:uid(), productId:p.id, date:date, qty:e.qty, remaining:e.qty, note:'EOD-'+subAt});
        updated++;
      } catch(ex) {
        errors.push('שגיאה ב-' + (e.name||e.id) + ': ' + ex.message);
      }
    });

    var status = errors.length===0 ? 'ok' : (updated>0 ? 'partial' : 'error');
    logUpdate({ id:updateId, type:'eod', ts:isoTime(), source:'EOD חנות · '+subAt, count:updated, skipped:skipped, errors:errors, status:status });

    eodSetAppliedTs(eod.submitted_at||'');
    var eodId = eod.id || (eod.date+'_main');
    fetch(SB_URL+'/rest/v1/condit_eod?id=eq.'+encodeURIComponent(eodId),{
      method:'PATCH',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({applied_at:new Date().toISOString()})
    }).catch(function(){});

    save(); render();
    checkLiveEOD();
    showEODSuccessBanner(updateId, updated, skipped, errors, subAt, status);
  })
  .catch(function(err){
    var lb = document.getElementById('eod-loading-banner');
    if(lb) lb.remove();
    var errMsg = err ? String(err.message || err) : 'שגיאת רשת';
    logUpdate({id:updateId, type:'eod', ts:isoTime(), source:'EOD חנות', status:'error', count:0, errors:[errMsg]});
    save();
    checkLiveEOD();
    showEODSuccessBanner(updateId, 0, 0, [errMsg], '', 'error');
  });
}


function showEODSuccessBanner(updateId, count, skipped, errors, subAt, status){
  var existing = document.getElementById('eod-success-banner');
  if(existing) existing.remove();

  var isOk      = status === 'ok';
  var isPartial = status === 'partial';
  var bg        = isOk ? '#f0fdf4' : isPartial ? '#fffbeb' : '#fef2f2';
  var border    = isOk ? '#16a34a' : isPartial ? '#d97706' : '#dc2626';
  var icon      = isOk ? '✅' : isPartial ? '⚠️' : '❌';
  var titleClr  = isOk ? '#15803d' : isPartial ? '#92400e' : '#991b1b';
  var title     = isOk
    ? 'עודכן מרחוק — ' + count + ' מוצרים'
    : isPartial
    ? 'עודכן חלקית — ' + count + ' הצליחו'
    : 'עדכון נכשל';

  var errHtml = '';
  if(errors && errors.length){
    errHtml = '<div style="margin-top:5px;font-size:11px;color:#b91c1c;background:rgba(220,38,38,.08);border-radius:5px;padding:4px 7px;">'
      + errors.slice(0,4).map(function(e){ return '• '+e; }).join('<br>')
      + (errors.length>4 ? '<br>ועוד '+(errors.length-4)+'...' : '')
      + '</div>';
  }

  var el = document.createElement('div');
  el.id = 'eod-success-banner';
  el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:150;'
    + 'background:'+bg+';border-bottom:3px solid '+border+';padding:10px 14px;'
    + 'direction:rtl;box-shadow:0 2px 16px rgba(0,0,0,.12);';
  el.innerHTML = '<div style="display:flex;align-items:flex-start;gap:10px;">'
    + '<span style="font-size:20px;flex-shrink:0;margin-top:1px;">'+icon+'</span>'
    + '<div style="flex:1;min-width:0;">'
    + '<div style="font-weight:800;color:'+titleClr+';font-size:14px;">'+title+'</div>'
    + '<div style="display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;">'
    + '<code style="font-size:11px;font-weight:700;background:rgba(0,0,0,.07);color:'+titleClr+';padding:2px 6px;border-radius:4px;letter-spacing:.04em;">'+escHtml(updateId)+'</code>'
    + (subAt ? '<span style="font-size:11px;color:#6b7280;">שעה '+subAt+'</span>' : '')
    + (skipped ? '<span style="font-size:11px;color:#6b7280;">'+skipped+' דולגו</span>' : '')
    + '</div>'
    + errHtml
    + '</div>'
    + '<button onclick="document.getElementById(\'eod-success-banner\').remove();" '
    + 'style="background:rgba(0,0,0,.07);border:none;border-radius:7px;padding:5px 9px;font-size:14px;cursor:pointer;color:#374151;flex-shrink:0;">✕</button>'
    + '</div>';
  document.body.appendChild(el);
  // Only auto-dismiss on errors (OK stays until manually closed)
  if(!isOk) setTimeout(function(){ var b=document.getElementById('eod-success-banner'); if(b) b.remove(); }, 15000);
}


var _liveInt=null;
function startLive(){checkLiveEOD();checkLiveProductions();if(_liveInt)clearInterval(_liveInt);_liveInt=setInterval(function(){checkLiveEOD();checkLiveProductions();},30000);}
function stopLive(){if(_liveInt){clearInterval(_liveInt);_liveInt=null;}}



// ── EVENT DELEGATION — single handler, setup once only ──
var _delegationSetup = false;

function setupDelegation(){
  if(_delegationSetup) return;
  _delegationSetup = true;

  document.addEventListener('click', function(e){
    // Handle clear-variants-btn directly (dynamic element)
    if(e.target.id === 'clear-variants-btn'){
      if(confirm('למחוק את כל השונות?')){ state.variants=[]; save(); render(); }
      return;
    }

    const t = e.target.closest('[data-nav],[data-cat],[data-eod-cat],[data-open],[data-open-transform],[data-nudge],[data-edit-product],[data-delete-product],[data-delete-order],[data-del-variant],[data-save],[data-cancel],[data-do-assign],[data-assign-variant]');
    if(!t) return;


    if(t.dataset.nav){
      ui.view = t.dataset.nav; ui.modal = null; render(); return;
    }
    if(t.dataset.cat){
      ui.filterCat = t.dataset.cat; render(); return;
    }
    if(t.dataset.eodCat){
      ui.eodFilter = t.dataset.eodCat; render(); return;
    }
    if(t.dataset.open){
      openModal(t.dataset.open); return;
    }
    if(t.dataset.openTransform){
      try{ const preset=JSON.parse(t.dataset.openTransform); ui.modal={kind:'transform',id:null,preset}; render(); }
      catch(err){ openModal('transform'); }
      return;
    }
    if(t.dataset.nudge !== undefined){
      const p = getProduct(t.dataset.nudge);
      if(!p) return;
      const delta = Number(t.dataset.d||0);
      if(p.shelfStock !== undefined){
        p.shelfStock = Math.max(0, num(p.shelfStock) + delta);
        p.stock      = num(p.shelfStock) + num(p.baseStock);
      } else {
        p.stock = Math.max(0, num(p.stock) + delta);
      }
      p.lastUpdated = isoTime(); p.lastSource = 'עדכון ידני';
      save();
      // Update only the number display — no full re-render
      const stock = p.shelfStock !== undefined ? num(p.shelfStock) + num(p.baseStock) : num(p.stock);
      t.closest('.qty-box')?.querySelector('.qty-val')?.
        setAttribute('style', t.closest('.qty-box')?.querySelector('.qty-val')?.getAttribute('style')||'');
      const valEl = t.closest('.qty-box')?.querySelector('.qty-val');
      if(valEl) valEl.textContent = stock;
      return;
    }
    if(t.dataset.editProduct !== undefined){
      openModal('product', Number(t.dataset.editProduct)); return;
    }
    if(t.dataset.deleteProduct !== undefined){
      if(!confirm('למחוק את המוצר?')) return;
      const pid = Number(t.dataset.deleteProduct);
      state.products    = state.products.filter(p=>Number(p.id)!==pid);
      state.orders      = state.orders.filter(o=>Number(o.productId)!==pid);
      state.productions = state.productions.filter(r=>Number(r.productId)!==pid);
      state.endDays     = state.endDays.filter(r=>Number(r.productId)!==pid);
      state.transforms  = state.transforms.filter(tr=>Number(tr.sourceId)!==pid&&Number(tr.targetId)!==pid);
      save(); toast('🗑 נמחק'); render(); return;
    }
    if(t.dataset.deleteOrder !== undefined){
      state.orders = state.orders.filter(o=>String(o.id)!==String(t.dataset.deleteOrder));
      save(); toast('🗑 הזמנה נמחקה'); render(); return;
    }
    if(t.dataset.save !== undefined){
      applySave(t.dataset.save, t.dataset.id); return;
    }
    if(t.dataset.cancel !== undefined){
      closeModal(); return;
    }
    if(t.dataset.doAssign !== undefined){
      handleVariantAssign(t); return;
    }
    if(t.dataset.delVariant !== undefined){
      var vid = t.dataset.delVariant;
      state.variants = (state.variants||[]).filter(function(v){ return v.id!==vid; });
      save(); render(); return;
    }
  });
} // end setupDelegation

// ── VARIANT ASSIGN (extracted from attachEvents) ──
function handleVariantAssign(btn){
  var vid   = btn.getAttribute('data-do-assign');
  var vName = btn.getAttribute('data-v-name');
  var vQty  = parseFloat(btn.getAttribute('data-v-qty'))||0;
  var vDate = btn.getAttribute('data-v-date')||iso();
  var vSrc  = btn.getAttribute('data-v-src')||'';
  var sel   = document.querySelector('[data-assign-variant="'+vid+'"]');
  var val   = sel ? sel.value : '';
  if(!val){ toast('בחר אפשרות'); return; }

  var v = (state.variants||[]).find(function(x){ return x.id===vid; });
  if(!v) return;
  var product = null;

  if(val==='new'){
    var newId   = Math.max(0,...state.products.map(function(p){ return Number(p.id)||0; }))+1;
    var newProd = {id:newId,name:vName,category:'אחר',stock:vSrc.indexOf('csv')!==-1?vQty:0,burn:5,buffer:25,demandMode:'hybrid',type:'fresh'};
    state.products.push(newProd);
    product = newProd;
    var mappings=loadMappings(); mappings[vName]=String(newId); saveMappings(mappings);
    toast('✓ מוצר חדש נוצר: '+vName);
  } else {
    var pid = val.replace('p:','');
    product = state.products.find(function(p){ return String(p.id)===pid; });
    if(!product){ toast('מוצר לא נמצא'); return; }
    var mappings=loadMappings(); mappings[vName]=pid; saveMappings(mappings);
  }

  if(vSrc.indexOf('csv')!==-1){
    syncProductStock(product,vQty,'סוף יום חנות');
    state.endDays=state.endDays.filter(function(r){ return !(Number(r.productId)===Number(product.id)&&r.date===vDate); });
    state.endDays.push({id:uid(),productId:product.id,date:vDate,qty:vQty});
  } else {
    state.orders=state.orders.filter(function(o){ return !(Number(o.productId)===Number(product.id)&&o.date===vDate&&(o.note||'').indexOf('xlsx')!==-1); });
    state.orders.push({id:uid(),productId:product.id,date:vDate,qty:vQty,note:'xlsx:variant'});
    if(!product.lastOrderDate||vDate>product.lastOrderDate){ product.lastOrderDate=isoTime(); product.lastOrderSource='הזמנות xlsx'; }
  }

  state.variants=(state.variants||[]).filter(function(x){ return x.id!==vid; });
  save(); render();
  if(val!=='new') toast('✓ שויך: '+vName+' → '+product.name);
}

attachEvents();
(async function(){
  try{
    var remote=await sbGet();
    if(!remote){ await sbSave(state); return; }
    var lt=state.lastSaved||'', rt=remote.lastSaved||'';
    if(rt>lt){
      state=migrateState(remote);
      try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }catch(e){}
      render();
    } else {
      await sbSave(state);
    }
  }catch(e){
    // Supabase unavailable - app already rendered from localStorage
    console.warn('Supabase sync failed, running offline:', e);
  }
})();
(function(){
  // auth removed
})();

})();
