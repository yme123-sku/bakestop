<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<link rel="manifest" href="manifest-condit-v4.json">
<meta charset="UTF-8">

<title>קונדיטוריה — ניהול ייצור</title>
<style>
/* ═══════════════════════════════
   קונדיטוריה v3 — Clean Field UI
   ═══════════════════════════════ */
:root{
  --bg:#f0f2f5;
  --surface:#ffffff;
  --surface2:#f7f8fa;
  --border:#e4e8ee;
  --text:#111827;
  --muted:#6b7688;
  --primary:#2563eb;
  --primary-soft:#eff6ff;
  --primary-border:#bfdbfe;
  --success:#15803d;
  --success-soft:#f0fdf4;
  --success-border:#bbf7d0;
  --warning:#b45309;
  --warning-soft:#fffbeb;
  --warning-border:#fde68a;
  --danger:#dc2626;
  --danger-soft:#fff5f5;
  --danger-border:#fecaca;
  --purple:#7c3aed;
  --radius:12px;
  --shadow:0 1px 6px rgba(0,0,0,.07);
  --shadow-lg:0 4px 20px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Helvetica Neue',Arial,'Noto Sans Hebrew',sans-serif;
  direction:rtl;
  min-height:100vh;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased
}
#app{min-height:100vh;animation:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}

/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:20;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:12px 14px 10px;
  box-shadow:var(--shadow)
}
.header-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
.brand-name{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.3px;line-height:1}
.brand-date{font-size:11px;color:var(--muted);margin-top:2px}
.hdr-actions{display:flex;gap:5px;align-items:center}
.hdr-btn{
  height:36px;min-width:36px;padding:0 10px;
  border:1px solid var(--border);
  border-radius:9px;
  background:var(--surface2);
  color:var(--muted);
  font-size:13px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:4px;
  transition: background-color .12s, border-color .12s, color .12s, transform .12s
}
.hdr-btn:active{transform:scale(.95)}
.hdr-btn.cloud{background:#f0fdf4;border-color:#bbf7d0;color:#15803d}
.hdr-btn.wa{background:#f0fdf4;border-color:#bbf7d0;color:#15803d}

/* Live monitor strip */
.live-strip{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:9px;padding:6px 10px;font-size:11px
}
.live-strip-label{color:var(--muted);font-weight:600;white-space:nowrap}
.live-strip-bar{flex:1;height:5px;background:#e2e6ec;border-radius:3px;overflow:hidden}
.live-strip-fill{height:100%;border-radius:3px;transition:width .4s}
.live-strip-pct{font-weight:700;white-space:nowrap;font-size:11px}
.live-strip-btn{font-size:10px;background:var(--primary);color:#fff;border:none;border-radius:5px;padding:3px 8px;cursor:pointer;white-space:nowrap}

/* ── SHELL ── */
#header-shell{position:sticky;top:0;z-index:20;background:var(--surface);}
#content-shell{padding:12px 12px 90px;min-height:calc(100vh - 130px);display:block;}
#bottom-shell{position:fixed;bottom:0;left:0;right:0;z-index:20;}
#modal-container{position:fixed;inset:0;pointer-events:none;z-index:50;}
#modal-container:not(:empty){pointer-events:auto;}
#toast-container{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);z-index:100;pointer-events:none;}
.page{padding:0!important;}

/* ── SECTION ── */
.section{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;margin-bottom:10px;
  box-shadow:var(--shadow)
}
.section.urgent{border-color:var(--danger-border);background:var(--danger-soft)}
.section.warning-s{border-color:var(--warning-border);background:var(--warning-soft)}
.section.ok{border-color:var(--border)}
.section.blue{border-color:var(--primary-border);background:var(--primary-soft)}
.section.green{border-color:var(--success-border);background:var(--success-soft)}
.sec-title{font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px}
.sec-title.red{color:var(--danger)}
.sec-title.orange{color:var(--warning)}
.sec-title.blue{color:var(--primary)}
.sec-title.green{color:var(--success)}
.sec-title.muted{color:var(--muted)}
.sec-title.purple{color:var(--purple)}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.kpi{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 6px;
  text-align:center;box-shadow:var(--shadow)
}
.kpi-num{font-size:36px;font-weight:800;line-height:1;letter-spacing:-1.5px}
.kpi-lbl{font-size:11px;color:var(--muted);margin-top:5px;font-weight:600}

/* ── ITEM ROW ── */
.item{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.item:last-child{border-bottom:none;padding-bottom:0}
.item-name{font-weight:700;font-size:15px;color:var(--text)}
.item-sub{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}
.item-right{font-weight:800;font-variant-numeric:tabular-nums;flex-shrink:0}

/* ── BADGE ── */
.badge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:7px;
  background:var(--surface2);border:1px solid var(--border);color:var(--muted);
  display:inline-block;line-height:1.3}
.badge.good{color:var(--success);background:var(--success-soft);border-color:var(--success-border)}
.badge.warn{color:var(--warning);background:var(--warning-soft);border-color:var(--warning-border)}
.badge.bad{color:var(--danger);background:var(--danger-soft);border-color:var(--danger-border)}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}
.card+.card{margin-top:8px}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-name{font-size:15px;font-weight:700;color:var(--text)}
.card-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.card-actions{display:flex;gap:5px;flex-shrink:0}
.small-btn{width:36px;height:36px;border-radius:9px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:14px;transition: background-color .12s, border-color .12s, color .12s, transform .12s}
.small-btn:active{transform:scale(.93)}
.small-btn.blue{color:var(--primary);border-color:var(--primary-border);background:var(--primary-soft)}
.small-btn.red{color:var(--danger);border-color:var(--danger-border);background:var(--danger-soft)}
.small-btn.green{color:var(--success);border-color:var(--success-border);background:var(--success-soft)}

/* ── PROGRESS ── */
.progress{height:4px;border-radius:999px;background:#e2e6ec;overflow:hidden;margin:10px 0 9px}
.fill{height:100%;border-radius:999px}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}

/* ── QTY BOX ── */
.qty-box{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.qty-btn{width:44px;height:44px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer}
.qty-btn:active{background:var(--border)}
.qty-val{min-width:52px;text-align:center;font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--text)}

/* ── QUICK ACTIONS ── */
.quick{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.quick-btn{
  border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 12px;font-weight:700;cursor:pointer;font-size:14px;
  background:var(--surface2);color:var(--text);
  transition: background-color .12s, border-color .12s, color .12s, transform .12s;text-align:center;line-height:1.3
}
.quick-btn:active{transform:scale(.97);background:var(--primary-soft);color:var(--primary);border-color:var(--primary-border)}

/* ── RULE ── */
.rule{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.rule:last-child{border-bottom:none}
.rule small{font-size:11px;color:var(--muted)}

/* ── PILL ── */
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.pill{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:999px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:600;transition: background-color .12s, border-color .12s, color .12s, transform .12s}
.pill.active{background:var(--primary-soft);border-color:var(--primary-border);color:var(--primary);font-weight:700}

/* ── MISC ── */
.note{font-size:12px;color:var(--muted);line-height:1.6}
.empty{text-align:center;color:#cbd5e1;padding:40px 10px;font-size:14px}
.empty .emoji{font-size:42px;margin-bottom:10px}
.list{display:flex;flex-direction:column;gap:8px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
hr.sep{border:none;border-top:1px solid var(--border);margin:10px 0}

/* ── EOD ── */
.eod-page{padding:12px 12px 100px}
.eod-header-box{background:var(--primary-soft);border:1px solid var(--primary-border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.eod-title{font-size:18px;font-weight:800;color:var(--primary);margin-bottom:4px}
.eod-sub{font-size:12px;color:var(--muted)}
.eod-grid{display:flex;flex-direction:column;gap:6px}
.eod-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 13px}
.eod-row.has-value{border-color:var(--primary-border);background:var(--primary-soft)}
.eod-name{flex:1;font-weight:600;font-size:14px;color:var(--text)}
.eod-stock{font-size:11px;color:var(--muted);margin-top:2px}
.eod-input{width:80px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px 10px;color:var(--warning);font-size:16px;font-weight:800;text-align:center;-webkit-appearance:none}
.eod-input:focus{border-color:var(--primary)}
.eod-waste-input{width:70px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px 10px;color:var(--danger);font-size:15px;font-weight:700;text-align:center;-webkit-appearance:none}

/* EOD filter row */
.eod-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.eod-filter-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:999px;padding:5px 12px;font-size:12px;cursor:pointer;font-weight:600}
.eod-filter-btn.active{background:var(--primary-soft);border-color:var(--primary-border);color:var(--primary);font-weight:700}
.eod-col-head{display:flex;gap:10px;padding:0 13px;margin-bottom:4px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.eod-col-head-name{flex:1}
.eod-col-head-r{width:80px;text-align:center}
.eod-col-head-w{width:70px;text-align:center}
.eod-save{width:100%;margin-top:14px;padding:16px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.3)}

/* ── BOTTOM BAR (4 tabs) ── */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);
  border-top:1px solid var(--border);
  display:grid;grid-template-columns:repeat(4,1fr);
  z-index:20;
  box-shadow:0 -2px 16px rgba(0,0,0,.07)
}
.tab-btn{
  border:none;background:none;color:var(--muted);
  padding:10px 4px 13px;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;transition:color .12s
}
.tab-btn.active{color:var(--primary)}
.tab-btn.tab-prod.active{color:#ea580c}
.tab-btn.tab-prod.active .tab-label{color:#ea580c;font-weight:800}
.tab-btn.tab-prod.active{color:#ea580c}
.tab-btn.tab-prod.active .tab-label{color:#ea580c;font-weight:800}
.tab-btn.active .tab-icon{transform:scale(1.1)}
.tab-icon{font-size:20px;line-height:1;transition:transform .15s}
.tab-label{font-size:10px;font-weight:700;letter-spacing:.02em}
/* status strip */
.status-strip{display:flex;gap:6px;padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.status-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid transparent;}
.status-chip.ok{background:#f0fdf4;border-color:#bbf7d0;color:#15803d;}
.status-chip.stale{background:#fffbeb;border-color:#fde68a;color:#b45309;}
.status-chip.missing{background:#fff5f5;border-color:#fecaca;color:#dc2626;}
.status-chip.neutral{background:#f1f5f9;border-color:#e2e8f0;color:#64748b;}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.status-dot.ok{background:#16a34a;}
.status-dot.stale{background:#d97706;}
.status-dot.missing{background:#dc2626;}
.status-dot.neutral{background:#94a3b8;}

/* status strip */

.status-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid transparent;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,.15)}
.handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:800;margin-bottom:14px;color:var(--text)}
.field{margin-bottom:12px}
label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
.input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;padding:11px 12px;font-size:15px;color:var(--text);transition:border-color .12s}
.input:focus{border-color:var(--primary)}
.select{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:9px;padding:11px 12px;font-size:15px;color:var(--text)}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.save{flex:1;background:var(--primary);color:#fff;border:none;border-radius:11px;padding:14px;font-weight:800;font-size:15px;cursor:pointer;transition:background .12s}
.save:active{background:#1d4ed8}
.cancel{padding:14px 18px;background:var(--surface2);color:var(--muted);border:1.5px solid var(--border);border-radius:11px;font-weight:700;cursor:pointer}

/* ── FAB ── */
.fab{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  background:var(--primary);color:#fff;border:none;border-radius:999px;
  padding:13px 22px;font-size:14px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 18px rgba(37,99,235,.35);z-index:30;white-space:nowrap}
.fab:active{transform:translateX(-50%) scale(.96)}

/* ── SETTINGS VIEW ── */
.settings-section{margin-bottom:14px}
.settings-title{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:0 2px;margin-bottom:8px}
.settings-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)
}
.settings-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .1s;gap:12px
}
.settings-row:last-child{border-bottom:none}
.settings-row:active{background:var(--surface2)}
.settings-row-icon{font-size:20px;flex-shrink:0}
.settings-row-body{flex:1;min-width:0}
.settings-row-label{font-size:14px;font-weight:700;color:var(--text)}
.settings-row-sub{font-size:11px;color:var(--muted);margin-top:2px}
.settings-row-arrow{color:var(--muted);font-size:14px;flex-shrink:0}

/* ── TOAST ── */
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);
  background:#111827;color:#fff;border-radius:999px;padding:10px 20px;
  font-size:13px;font-weight:700;z-index:100;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.25);pointer-events:none;
  animation:fadeUp .2s ease}

/* ── SHOW SB STATUS ── */
.sb-dot{font-size:11px;font-weight:400;color:#94a3b8;margin-right:6px}

/* modal overlay id */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center}

const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const iso      = (d=new Date()) => d.toISOString().slice(0,10);
const isoTime  = (d=new Date()) => {
  const h = d.getHours().toString().padStart(2,'0');
  const m = d.getMinutes().toString().padStart(2,'0');
  return iso(d) + ' ' + h + ':' + m;
};
// Convert UTC timestamp from Supabase to local time display (HH:MM)
function utcToLocalTime(ts){
  if(!ts) return '';
  // ts can be "2026-05-28T17:44:00" or "2026-05-28 17:44:00"
  var normalized = ts.replace(' ','T');
  if(!normalized.endsWith('Z') && !normalized.includes('+')) normalized += 'Z';
  var d = new Date(normalized);
  if(isNaN(d)) return ts.slice(11,16); // fallback
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}
// Same but returns full local datetime string
function utcToLocalFull(ts){
  if(!ts) return '';
  var normalized = ts.replace(' ','T');
  if(!normalized.endsWith('Z') && !normalized.includes('+')) normalized += 'Z';
  var d = new Date(normalized);
  if(isNaN(d)) return ts.slice(0,16).replace('T',' ');
  var date = d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');
  return date + ' ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}
const addDays = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };

function fmtDate(s){
  try{ return new Date(s+'T00:00:00').toLocaleDateString('he-IL',{weekday:'short',day:'numeric',month:'numeric'}); }

function escHtml(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return escHtml(s).replace(/'/g,'&#39;'); }

function productTypeHint(p){

function num(v, fallback = 0){
  const n = Number(v);
  return Number.isFinite(n) ? n : fallback;
}

function demandModeLabel(mode){
  return ({burn:'מדף', orders:'הזמנות', hybrid:'היברידי'})[mode] || 'מדף';

function productTotalStock(p){
  if(!p) return 0;
  if(p.shelfStock !== undefined || p.baseStock !== undefined){
    return Math.max(0, num(p.shelfStock) + num(p.baseStock));
  }
  return Math.max(0, num(p.stock));
}

function logInventoryChange(productId, shelfBefore, baseBefore, shelfAfter, baseAfter, source){
  if(!state.inventoryLog) state.inventoryLog = [];
  const p = getProduct(productId);
  const shelfDelta = (shelfAfter||0) - (shelfBefore||0);
  const baseDelta  = (baseAfter||0)  - (baseBefore||0);
  if(shelfDelta === 0 && baseDelta === 0) return; // no change
  state.inventoryLog.unshift({
    ts:        isoTime(),
    productId: productId,
    name:      p ? p.name : String(productId),
    shelfBefore: Math.round(shelfBefore*100)/100,
    baseBefore:  Math.round(baseBefore*100)/100,
    shelfAfter:  Math.round(shelfAfter*100)/100,
    baseAfter:   Math.round(baseAfter*100)/100,
    shelfDelta:  Math.round(shelfDelta*100)/100,
    baseDelta:   Math.round(baseDelta*100)/100,
    source:    source || 'ידני'
  });
  if(state.inventoryLog.length > 500) state.inventoryLog = state.inventoryLog.slice(0,500);
}

function syncProductStock(p, total, source){
  const value = Math.max(0, num(total));
  const shelfBefore = num(p.shelfStock);
  const baseBefore  = num(p.baseStock);
  // EOD always updates shelf (what's visible on the counter)
  // Base stock is only updated manually (production/baking/morning dispatch)
  if(p.baseStock !== undefined){
    // Has base/shelf model — EOD updates shelf only
    p.shelfStock = value;
    p.stock      = value + num(p.baseStock);
  } else {
    p.stock = value;
  }
  if(source){ p.lastUpdated = isoTime(); p.lastSource = source; }
  logInventoryChange(p.id, shelfBefore, baseBefore, num(p.shelfStock), num(p.baseStock), source||'עדכון');
  return value;
}

function demandProfile(p){
  const ordersQty = p.__ordersQty || 0;
  const burnQty = Math.max(0, num(p.dailyBurn) * HORIZON);
  const mode = p.demandMode || 'hybrid';
  let demand = burnQty;
  if(mode === 'orders') demand = ordersQty;
  else if(mode === 'hybrid') demand = Math.max(burnQty, ordersQty);
  const bufferPct = num(p.bufferPct ?? 25, 25);
  const target = Math.ceil(demand * (1 + bufferPct / 100));
  return { ordersQty, burnQty, demand, bufferPct, target };
}

function migrateProduct(p){
  const catBurn = (CATEGORIES.find(c=>c.name===p.category)||{burn:5}).burn;
  const autoDoughFamily =
    p.category === 'מאפים'    ? 'croissant' :
    p.category === 'קראנצים'  ? 'krantz'    :
    p.category === 'לחמים'    ? 'kasten'    : null;
  const stock = num(p.stock ?? p.quantity ?? 0);
  const shelfStock = p.shelfStock !== undefined ? num(p.shelfStock) : stock;
  const baseStock  = p.baseStock !== undefined ? num(p.baseStock) : 0;
  return {
    id:        Number(p.id) || uid(),
    name:      p.name || p.productName || 'מוצר',
    category:  p.category || 'אחר',
    stock,
    shelfStock,
    baseStock,
    minStock:  num(p.minStock ?? p.minimum ?? 3),
    dailyBurn: num(p.dailyBurn ?? p.burn ?? catBurn),
    demandMode: p.demandMode || 'hybrid',
    bufferPct:  num(p.bufferPct ?? 25, 25),
    shelfLife:      num(p.shelfLife ?? 3),
    type:           p.type || p.kind || 'fresh',
    eodTrack:       p.eodTrack !== false,
    shelfMinAlert:  num(p.shelfMinAlert ?? 0),  // 🟡 מדף מינימום → אפה
    baseMinAlert:   num(p.baseMinAlert  ?? 0),  // 🔴 בסיס מינימום → ייצר
    weeklyBurn:     num(p.weeklyBurn    ?? 0),  // שריפה שבועית
    regulated:      p.regulated === true,        // מוצר מווסת — מופיע בפתיחת יום
    noCarryover:    p.noCarryover === true,       // נשאר הולך להמרה — לא נספר בסוף יום
    doughFamily:    p.doughFamily || autoDoughFamily || null,
    // Transform defaults (for planning screen)
    defaultTransforms: Array.isArray(p.defaultTransforms) ? p.defaultTransforms : [],
    // [{targetId, qty, fridayQty}]
    fridayBurn:     num(p.fridayBurn ?? p.burn ?? 0), // burn for friday/saturday
  };
}

function migrateState(raw){
  const base = defaultState();
  if(!raw || typeof raw !== 'object') return base;

  if(Array.isArray(raw.products) && raw.products.length){
    base.products = raw.products.map(migrateProduct);
  }
  if(Array.isArray(raw.orders)){
    base.orders = raw.orders.map(o=>({
      id: o.id||uid(), productId: Number(o.productId??o.pid??0),
      date: o.date||iso(), qty: Number(o.qty??0), note: o.note||''
    })).filter(o=>o.productId);
  }
  if(Array.isArray(raw.productions)){
    base.productions = raw.productions.map(r=>({
      id: r.id||uid(), productId: Number(r.productId??r.pid??0),
      date: r.date||iso(), qty: Number(r.qty??0), note: r.note||''
    })).filter(r=>r.productId);
  }
  if(Array.isArray(raw.endDays)){
    base.endDays = raw.endDays.map(r=>({
      id: r.id||uid(), productId: Number(r.productId??r.pid??0),
      date: r.date||iso(), remaining: Number(r.remaining??0),
      waste: Number(r.waste??0), note: r.note||''
    })).filter(r=>r.productId);
  }
  if(Array.isArray(raw.transforms)){
    base.transforms = raw.transforms.map(t=>({
      id: t.id||uid(), sourceId: Number(t.sourceId??0),
      targetId: Number(t.targetId??0), ratio: Number(t.ratio??1), note: t.note||''
    })).filter(t=>t.sourceId&&t.targetId);
  }
  if(Array.isArray(raw.customCategories)) base.customCategories = raw.customCategories.slice();

  // ── Cleanup: move EOD orders → endDays, remove qty=0 xlsx orders ──
  var eodOrders = base.orders.filter(function(o){
    return (o.note||'').indexOf('סוף יום') !== -1;
  });
  eodOrders.forEach(function(o){
    var exists = base.endDays.some(function(e){
      return Number(e.productId)===Number(o.productId) && e.date===o.date;
    });
    if(!exists){
      base.endDays.push({ id:uid(), productId:Number(o.productId), date:o.date,
        qty:Number(o.qty), remaining:Number(o.qty), waste:0, note:'מועבר אוטומטית' });
    }
  });
  base.orders = base.orders.filter(function(o){
    return (o.note||'').indexOf('סוף יום') === -1;
  });
  // Remove zero-qty xlsx orders (empty rows)
  base.orders = base.orders.filter(function(o){
    return !(Number(o.qty) === 0 && (o.note||'').indexOf('xlsx') !== -1);
  });

  return base;
}

function loadState(){

// ═══════════════════════════════
//  RISK ENGINE
// ═══════════════════════════════
function productFlow(p){
  const today = iso();
  const futureDate = iso(addDays(new Date(), HORIZON));

  // future orders within horizon
  const ordersQty = state.orders
    .filter(o => Number(o.productId)===Number(p.id) && o.date>=today && o.date<=futureDate)
    .reduce((s,o)=>s+Number(o.qty||0), 0);

  // scheduled production within horizon
  const prodQty = state.productions
    .filter(r => Number(r.productId)===Number(p.id) && r.date>=today && r.date<=futureDate)
    .reduce((s,r)=>s+Number(r.qty||0), 0);

  const stock = productTotalStock(p);
  const { demand, bufferPct, target } = demandProfile({ ...p, __ordersQty: ordersQty });
  const available = stock + prodQty;
  const demandPerDay = demand > 0 ? demand / HORIZON : 0;
  const runway = demandPerDay > 0 ? available / demandPerDay : 999;
  const forecast7 = available - demand;
  const demandGap = Math.max(0, demand - available);
  const bufferGap = Math.max(0, target - available);

  const risk = demandGap > 0
    ? 'urgent'
    : bufferGap > 0
      ? 'warning'
      : 'ok';

  const suggested = bufferGap;

  return { ordersQty, prodQty, available, runway, forecast7, risk, suggested, target, demand, demandGap, bufferGap, bufferPct, stock };
}

function totals(){
  const flows = state.products.map(p=>productFlow(p));
  return {
    total:   state.products.length,
    stock:   state.products.reduce((s,p)=>s+productTotalStock(p),0),
    urgent:  flows.filter(f=>f.risk==='urgent').length,
    warning: flows.filter(f=>f.risk==='warning').length,
    orders7: state.orders
      .filter(o=>o.date>=iso()&&o.date<=iso(addDays(new Date(),HORIZON)))
      .reduce((s,o)=>s+Math.round(Number(o.qty||0)*100)/100,0),
  };
}

const tabScrollPositions = {};
let lastActiveTab = null;

function render(){
  const t = totals();
  const currentView = ui.view;

  const headerShell  = document.getElementById('header-shell');
  const bottomShell  = document.getElementById('bottom-shell');
  const contentShell = document.getElementById('content-shell');
  const modalCont    = document.getElementById('modal-container');
  const toastCont    = document.getElementById('toast-container');
  if(!contentShell) return;

  // Save scroll of departing tab
  if(lastActiveTab && lastActiveTab !== currentView){
    tabScrollPositions[lastActiveTab] = window.scrollY || 0;
  }

  // Header: build once, never rebuild
  if(!headerShell.innerHTML){
    headerShell.innerHTML = header();
    attachHeaderEvents();
  } else {
    // Just update live strip
    startLiveMonitor();
  }

  // Bottom bar: rebuild only on view change (tab indicator)
  if(lastActiveTab !== currentView || !bottomShell.innerHTML){
    bottomShell.innerHTML = bottomBar(t) + (currentView!=='eod' ? fabBtn() : '');
    attachBottomEvents();
  }

  // Content: always replace
  let viewHtml = '';
  if(currentView==='board')         viewHtml = boardView(t);
  else if(currentView==='products') viewHtml = productsView(t);
  else if(currentView==='orders')   viewHtml = ordersView(t);
  else if(currentView==='variants') viewHtml = variantsView();
  else if(currentView==='forecast') viewHtml = forecastView();
  else if(currentView==='planning') viewHtml = planningView();
  else if(currentView==='eod')      viewHtml = eodView();
  else if(currentView==='reports'){
    viewHtml = reportsView();
    // Set today as default only if user hasn't picked a date yet
    if(!ui.reportsDate) ui.reportsDate = iso();
    // Auto-load only on first visit (no cache at all)
    if(!_reportsCache.date){
      setTimeout(function(){
        if(window._sbReady) loadReports();
      }, 200);
    }
  }
  else if(currentView==='settings')      viewHtml = settingsView();
  else if(currentView==='baker-families') viewHtml = bakerFamiliesView();

  contentShell.innerHTML = viewHtml;

  // Modal & toast in their own containers
  modalCont.innerHTML = ui.modal ? modalMarkup() : '';
  toastCont.innerHTML = ui.toast ? `<div class="toast">${escHtml(ui.toast)}</div>` : '';

  lastActiveTab = currentView;

  attachContentEvents();

  // Restore scroll position
  const savedScroll = tabScrollPositions[currentView];
  if(typeof savedScroll === 'number'){
    window.scrollTo(0, savedScroll);
  } else {
    window.scrollTo(0, 0);
  }

  if(currentView==='board') startLive(); else stopLive();

  if(ui.modal?.kind==='transform'&&ui.modal?.preset){
    const pr = ui.modal.preset;
    if(byId('t-source')) byId('t-source').value = String(pr.sourceId||'');
    if(byId('t-target')) byId('t-target').value = String(pr.targetId||'');
    if(byId('t-qty'))    byId('t-qty').value    = String(pr.qty||'');
    if(byId('t-ratio'))  byId('t-ratio').value  = String(pr.ratio||1);
    ui.modal.preset = null;
  }
}

// ── DATA FRESHNESS ──
function freshnessTag(dateStr, label){
  if(!dateStr) return '<span style="font-size:10px;color:#94a3b8;background:#f1f5f9;padding:2px 6px;border-radius:4px;">לא עודכן</span>';
  // dateStr may include time: "2026-05-12 20:34"
  const datePart = dateStr.slice(0,10);
  const timePart = dateStr.length > 10 ? ' ' + dateStr.slice(11,16) : '';
  const days = Math.floor((new Date() - new Date(datePart+'T00:00:00')) / 86400000);
  if(days === 0) return '<span style="font-size:10px;color:#15803d;background:#f0fdf4;border:1px solid #bbf7d0;padding:2px 6px;border-radius:4px;">✓ היום'+timePart+' · '+label+'</span>';
  if(days === 1) return '<span style="font-size:10px;color:#d97706;background:#fffbeb;border:1px solid #fde68a;padding:2px 6px;border-radius:4px;">⚠ אתמול'+timePart+' · '+label+'</span>';
  if(days <= 3)  return '<span style="font-size:10px;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;padding:2px 6px;border-radius:4px;">🔴 לפני '+days+' ימים · '+label+'</span>';
  return '<span style="font-size:10px;color:#dc2626;background:#fef2f2;border:1px solid #fecaca;padding:2px 6px;border-radius:4px;font-weight:700;">⛔ '+days+' ימים · '+label+'</span>';
}

function productFreshnessHtml(p){
  var parts = [];
  if(p.lastUpdated)    parts.push(freshnessTag(p.lastUpdated, p.lastSource||'מלאי'));
  if(p.lastOrderDate)  parts.push(freshnessTag(p.lastOrderDate, p.lastOrderSource||'הזמנות'));
  if(p.lastProdDate)   parts.push(freshnessTag(p.lastProdDate, p.lastProdSource||'ייצור'));
  return parts.join(' ');
}

//  BOARD VIEW
// ═══════════════════════════════
function boardView(t){
  const all = state.products
    .map(p=>({p, f:productFlow(p)}))
    .sort((a,b)=>a.f.runway-b.f.runway);

  const urgent  = all.filter(x=>x.f.risk==='urgent');
  const warning = all.filter(x=>x.f.risk==='warning');
  const ok      = all.filter(x=>x.f.risk==='ok');

  const needBake = state.products.filter(p =>
    num(p.shelfMinAlert) > 0 && num(p.shelfStock) <= num(p.shelfMinAlert) && num(p.baseStock) > 0
  );
  const needProd = state.products.filter(p =>
    num(p.baseMinAlert) > 0 && num(p.baseStock) <= num(p.baseMinAlert)
  );

  // ── Activity feed + status chips ──
  const invLog = (state.inventoryLog || []);
  const cutoff = new Date(Date.now() - 24*60*60*1000).toISOString().slice(0,16);
  const todayLog = invLog.filter(function(e){ return (e.ts||'') >= cutoff; });

  // Group by source+time window (2 min = same session)
  const sessions = [];
  todayLog.forEach(function(e){
    const last = sessions[sessions.length-1];
    const timeDiff = last ? Math.abs(new Date(e.ts)-new Date(last.ts)) : Infinity;
    if(last && last.source===e.source && timeDiff < 120000){
      last.items.push(e);
    } else {
      sessions.push({ source:e.source, ts:e.ts, items:[e] });
    }
  });

  const SRC_META = {
    'EOD':       { icon:'📋', color:'#15803d', bg:'#f0fdf4', border:'#bbf7d0' },
    'סוף יום':   { icon:'📋', color:'#15803d', bg:'#f0fdf4', border:'#bbf7d0' },
    'אפייה':     { icon:'🔥', color:'#b45309', bg:'#fffbeb', border:'#fde68a' },
    'פתיחת יום': { icon:'🌅', color:'#7c3aed', bg:'#f5f3ff', border:'#ddd6fe' },
  };
  function getSrcMeta(source){
    for(var k in SRC_META){ if((source||'').indexOf(k)!==-1) return SRC_META[k]; }
    return { icon:'📦', color:'#2563eb', bg:'#eff6ff', border:'#bfdbfe' };
  }

  var activityHtml = '';
  if(sessions.length){
    activityHtml = '<div style="margin-bottom:10px;">'
      + '<div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">פעילות היום</div>'
      + sessions.slice(0,5).map(function(s){
          var m = getSrcMeta(s.source);
          var time = utcToLocalTime(s.ts||'');
          var rows = s.items.slice(0,6).map(function(e){
            var delta = e.shelfDelta !== 0 ? e.shelfDelta : e.baseDelta;
            var sign = delta > 0 ? '+' : '';
            var col  = delta > 0 ? '#15803d' : delta < 0 ? '#dc2626' : '#6b7280';
            return '<div style="display:flex;justify-content:space-between;padding:2px 0;font-size:11px;border-bottom:1px solid rgba(0,0,0,.04);">'
              + '<span style="color:#374151;">'+escHtml(e.name)+'</span>'
              + '<span style="font-weight:800;color:'+col+';font-family:monospace;">'+sign+delta+'</span>'
              + '</div>';
          }).join('');
          var more = s.items.length > 6 ? '<div style="font-size:10px;color:var(--muted);padding-top:2px;">ועוד '+(s.items.length-6)+'...</div>' : '';
          return '<div style="background:'+m.bg+';border:1px solid '+m.border+';border-right:3px solid '+m.color+';border-radius:8px;padding:8px 10px;margin-bottom:6px;">'
            + '<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">'
            + '<span style="font-size:13px;">'+m.icon+'</span>'
            + '<span style="font-size:11px;font-weight:800;color:'+m.color+';">'+escHtml(s.source)+'</span>'
            + '<span style="font-size:10px;color:var(--muted);margin-right:auto;">'+time+'</span>'
            + '<span style="font-size:10px;background:rgba(0,0,0,.06);border-radius:4px;padding:1px 5px;color:'+m.color+';">'+s.items.length+' מוצרים</span>'
            + '</div>'
            + rows + more + '</div>';
        }).join('') + '</div>';
  }

  const liveProds = window._liveProductions || {};
  const liveBaker    = liveProds.baker    || null;
  const liveFinishing= liveProds.finishing|| null;
  const lastEod  = (state.updateLog||[]).find(function(e){ return e.type==='eod' && e.status!=='error'; });

  function chipHtml(label, entry){
    if(!entry){ return `<div class="status-chip missing"><div class="status-dot missing"></div>${label}</div>`; }
    const isToday = entry.date && (entry.date+'').slice(0,10) === iso();
    const cls = isToday ? 'ok' : 'stale';
    const rawTs = entry.ts || entry.date || '';
    const time = rawTs.length >= 16 ? rawTs.slice(11,16) : '';
    return `<div class="status-chip ${cls}"><div class="status-dot ${cls}"></div>${label}${time?' · '+time:''}</div>`;
  }
  function liveChipHtml(label, liveEntry){
    if(!liveEntry){ return `<div class="status-chip missing"><div class="status-dot missing"></div>${label}</div>`; }
    const isToday = liveEntry.date === iso();
    const cls = isToday ? 'ok' : 'stale';
    const time = utcToLocalTime(liveEntry.ts||'');
    return `<div class="status-chip ${cls}"><div class="status-dot ${cls}"></div>${label}${time?' · '+time:''}</div>`;
  }
  const statusStrip = `<div class="status-strip">
    ${liveChipHtml('ייצור', liveBaker)}
    ${liveChipHtml('הוצאה', liveFinishing)}
    ${chipHtml('סוף יום', lastEod)}
  </div>`;

  const bItem = (p,f,color) => `
    <div class="item">
      <div>
        <div class="item-name">${escHtml(p.name)}</div>
        <div class="item-sub">מלאי ${f.stock} · הזמנות ${f.ordersQty} · יעד ${f.target}</div>
        <div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:4px;">${productFreshnessHtml(p)}</div>
      </div>
      <div class="item-right">
        <span class="badge ${color==='var(--red)'?'bad':color==='var(--orange)'?'warn':'good'}">
          ${f.runway>=99?'∞':f.runway.toFixed(1)+' י׳'}
        </span>
      </div>
    </div>`;

  const suggestions = all
    .filter(x=>x.f.suggested>0)
    .sort((a,b)=>b.f.suggested-a.f.suggested)
    .slice(0,6)
    .map(({p,f})=>`
    <div class="item">
      <div>
        <div class="item-name">${escHtml(p.name)}</div>
        <div class="item-sub">נדרש ${f.suggested} יח׳ · מלאי ${f.stock} · Buffer ${f.bufferPct}%</div>
      </div>
      <div class="item-right" style="color:var(--red)">${f.runway>=99?'∞':f.runway.toFixed(1)+' י׳'}</div>
    </div>`).join('');

  const xfSuggestions = state.transforms.map(rule=>{
    const src = getProduct(rule.sourceId);
    const tgt = getProduct(rule.targetId);
    if(!src||!tgt) return '';
    const tgtFlow = productFlow(tgt);
    const tgtDemand = demandProfile({ ...tgt, __ordersQty: tgtFlow.ordersQty });
    const need = Math.max(0, tgtDemand.target - tgtFlow.available);
    const free = Math.max(0, productTotalStock(src) - Number(src.minStock||0));
    const canMove = Math.min(free,need);
    if(canMove<=0) return '';
    return `
      <div class="rule">
        <div>
          <div class="item-name">${escHtml(src.name)} → ${escHtml(tgt.name)}</div>
          <small>אפשר להסב ${canMove} יח׳ · יחס ${rule.ratio||1}:1</small>
        </div>
        <button class="small-btn blue"
          data-open-transform='${escAttr(JSON.stringify({sourceId:src.id,targetId:tgt.id,qty:canMove,ratio:rule.ratio||1}))}'>▶</button>
      </div>`;
  }).filter(Boolean).join('');

  const today = iso();
  const in3   = iso(addDays(new Date(),3));
  const nearOrders = state.orders
    .filter(o=>o.date>=today&&o.date<=in3)
    .sort((a,b)=>a.date.localeCompare(b.date))
    .slice(0,15)
    .map(o=>{
      const p = getProduct(o.productId);
      return `
        <div class="item">
          <div>
            <div class="item-name">${p?escHtml(p.name):'מוצר לא קיים'}</div>
            <div class="item-sub">${fmtDate(o.date)} · ${o.qty} יח׳${o.note?' · '+escHtml(o.note):''}</div>
          </div>
          <button class="small-btn red" data-delete-order="${escAttr(String(o.id))}">✕</button>
        </div>`;
    }).join('');

  return `
    <div class="page">
      ${statusStrip}
      ${activityHtml}
      <div id="live-monitor" style="display:none;"></div>
      <div class="kpi-row">
        <div class="kpi" style="border-color:#f8717133">
          <div class="kpi-num" style="color:var(--red)">${urgent.length}</div>
          <div class="kpi-lbl">חייב</div>
        </div>
        <div class="kpi" style="border-color:#f59e0b33">
          <div class="kpi-num" style="color:var(--orange)">${warning.length}</div>
          <div class="kpi-lbl">סיכון</div>
        </div>
        <div class="kpi" style="border-color:#10b98133">
          <div class="kpi-num" style="color:var(--green)">${ok.length}</div>
          <div class="kpi-lbl">תקין</div>
        </div>
      </div>

      ${needBake.length ? `
      <div class="section" style="border-color:#fde68a;background:#fffbeb;">
        <div class="sec-title" style="color:#d97706;">מדף נמוך — נדרשת אפייה עכשיו</div>
        ${needBake.map(p=>`
          <div class="item">
            <div>
              <div class="item-name">${escHtml(p.name)}</div>
              <div class="item-sub">מדף: ${num(p.shelfStock)} · מינימום: ${num(p.shelfMinAlert)} · בסיס: ${num(p.baseStock)}</div>
            </div>
            <button onclick="openModal({kind:'baking'})" style="background:#d97706;border:none;color:#fff;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;">אפה</button>
          </div>`).join('')}
      </div>` : ''}

      ${needProd.length ? `
      <div class="section" style="border-color:#fecaca;background:#fff5f5;">
        <div class="sec-title" style="color:#dc2626;">בסיס נמוך — נדרש ייצור בצק</div>
        ${needProd.map(p=>`
          <div class="item">
            <div>
              <div class="item-name">${escHtml(p.name)}</div>
              <div class="item-sub">בסיס: ${num(p.baseStock)} · מינימום: ${num(p.baseMinAlert)}</div>
            </div>
            <span class="badge bad">ייצר בצק</span>
          </div>`).join('')}
      </div>` : ''}

      <div class="section urgent">
        <div class="sec-title red">חייב טיפול עכשיו</div>
        ${urgent.length
          ? urgent.map(({p,f})=>bItem(p,f,'var(--danger)')).join('')
          : '<div class="note">אין כרגע — תקין</div>'}
      </div>

      <div class="section warning-s">
        <div class="sec-title orange">השבוע בסיכון</div>
        ${warning.length
          ? warning.map(({p,f})=>bItem(p,f,'var(--warning)')).join('')
          : '<div class="note">אין</div>'}
      </div>

      <div class="section ok">
        <div class="sec-title muted">תקין — אפשר לדחות</div>
        ${ok.length
          ? ok.slice(0,6).map(({p,f})=>bItem(p,f,'var(--green)')).join('')
            + (ok.length>6?`<div class="note" style="margin-top:6px">ועוד ${ok.length-6} מוצרים תקינים...</div>`:'')
          : '<div class="note">אין</div>'}
      </div>

      ${suggestions ? `
      <div class="section blue">
        <div class="sec-title blue">המלצות ייצור</div>
        ${suggestions}
      </div>` : ''}

      ${xfSuggestions ? `
      <div class="section green">
        <div class="sec-title purple">המרות מומלצות</div>
        ${xfSuggestions}
      </div>` : ''}

      <div class="section green">
        <div class="sec-title green">הזמנות — 3 ימים קרובים</div>
        ${nearOrders||'<div class="note">אין הזמנות ל-3 הימים הקרובים</div>'}
      </div>

      <div class="section">
        <div class="sec-title muted">לוג עדכונים</div>
        ${updateLogView()}
      </div>

      <div class="section">
        <div class="sec-title muted">פעולות מהירות</div>
        <div class="quick">
          <button class="quick-btn hot"      data-open="production">ייצור בוצע</button>
          <button class="quick-btn blue-q"   data-open="order">הזמנה</button>
          <button class="quick-btn purple-q" data-open="transform">המרה</button>
          <button class="quick-btn red-q"    data-open="product">+ מוצר</button>
        </div>
      </div>
    </div>`;
}

function productsView(){
  const cats = catsInUse();
  const visible = state.products.filter(p=>ui.filterCat==='הכל'||p.category===ui.filterCat);

  const pills = cats.map(c=>`
    <button class="pill ${ui.filterCat===c?'active':''}" data-cat="${escAttr(c)}">${escHtml(c)}</button>`).join('');

  const cards = visible.length ? visible.map(p=>{
    const f = productFlow(p);
    const label = f.risk==='urgent'?'bad':f.risk==='warning'?'warn':'good';
    const pct = Math.max(0,Math.min(100,Math.round(productTotalStock(p)/Math.max(Number(p.minStock||1)*5,20)*100)));
    return `
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-name">${escHtml(p.name)}</div>
        <div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:4px;">${productFreshnessHtml(p)}</div>
            <div class="card-meta">
              <span class="badge ${label}">${f.risk==='urgent'?'דחוף':f.risk==='warning'?'סיכון':'תקין'}</span>
              <span class="badge">${escHtml(p.category||'אחר')}</span>
              ${p.doughFamily ? `<span class="badge" style="background:#eff6ff;border-color:#bfdbfe;color:#2563eb;">🫙 ${escHtml(DOUGH_FAMILIES.find(f=>f.id===p.doughFamily)?.name||p.doughFamily)}</span>` : ''}
              <span class="badge">מדף ${num(p.shelfStock ?? productTotalStock(p))}</span>
              <span class="badge">בסיס ${num(p.baseStock ?? 0)}</span>
              <span class="badge">ביקוש ${demandModeLabel(p.demandMode)}</span>
              <span class="badge">שריפה ${p.dailyBurn}/י</span>
              <span class="badge">Buffer ${num(p.bufferPct ?? 25)}%</span>
              <span class="badge">תוקף ${p.shelfLife}י</span>
              ${p.eodTrack?'<span class="badge good">EOD</span>':''}
            </div>
          </div>
          <div class="card-actions">
            <button class="small-btn blue" data-edit-product="${p.id}">✎</button>
            <button class="small-btn red"  data-delete-product="${p.id}">✕</button>
          </div>
        </div>
        <div class="progress">
          <div class="fill" style="width:${pct}%;background:${
            f.risk==='urgent'?'linear-gradient(90deg,var(--red),#f8717188)':
            f.risk==='warning'?'linear-gradient(90deg,var(--orange),#f59e0b88)':
            'linear-gradient(90deg,var(--green),#10b98188)'}"></div>
        </div>
        <div class="row">
          <div class="note">מלאי ${f.stock} · מינ׳ ${p.minStock} · ביקוש ${f.demand} · Buffer יעד ${f.target}</div>
          <div class="qty-box">
            <button class="qty-btn" data-nudge="${p.id}" data-d="-1">−</button>
            <div class="qty-val" style="color:${f.risk==='urgent'?'var(--red)':f.risk==='warning'?'var(--orange)':'var(--green)'}">${f.stock}</div>
            <button class="qty-btn" data-nudge="${p.id}" data-d="1">+</button>
          </div>
        </div>
      </div>`;
  }).join('') : `<div class="empty"><div class="emoji">🥐</div>אין מוצרים להצגה</div>`;

  return `
    <div class="page">
      <div class="section">
        <div class="sec-title muted">סינון</div>
        <div class="pill-row">${pills}</div>
      </div>
      <div class="list">${cards}</div>
    </div>`;
}

function ordersView(){
  const sorted = state.orders.slice().sort((a,b)=>a.date.localeCompare(b.date));
  const cards = sorted.length ? sorted.map(o=>{
    const p = getProduct(o.productId);
    return `
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-name">${p?escHtml(p.name):'מוצר לא קיים'}</div>
            <div class="card-meta">
              <span class="badge">${fmtDate(o.date)}</span>
              <span class="badge">${o.qty} יח׳</span>
              ${o.note?`<span class="badge">${escHtml(o.note)}</span>`:''}
            </div>
          </div>

function eodView(){
  const today = new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});

  // products marked for EOD tracking (eodTrack=true)
  const eodProducts = state.products.filter(p=>p.eodTrack!==false);
  const cats = ['הכל',...new Set(eodProducts.map(p=>p.category).filter(Boolean))];

  const visible = eodProducts.filter(p=>ui.eodFilter==='הכל'||p.category===ui.eodFilter);

  const filterBtns = cats.map(c=>`
    <button class="eod-filter-btn ${ui.eodFilter===c?'active':''}" data-eod-cat="${escAttr(c)}">${escHtml(c)}</button>`).join('');

  const rows = visible.map(p=>`
    <div class="eod-row" id="eod-row-${p.id}">
      <div style="flex:1">
        <div class="eod-name">${escHtml(p.name)}</div>
        <div class="eod-stock">מלאי נוכחי: ${productTotalStock(p)}</div>
      </div>
      <input class="eod-input" type="number" inputmode="numeric"
        id="eod-r-${p.id}" placeholder="נשאר"
        oninput="markEodRow(${p.id})">
      <input class="eod-waste-input" type="number" inputmode="numeric"
        id="eod-w-${p.id}" placeholder="פחת"
        oninput="markEodRow(${p.id})">
    </div>`).join('');

  return `
    <div class="eod-page">
      <div class="eod-header-box">
        <div class="eod-title">📋 דיווח סוף יום</div>
        <div class="eod-sub">מלא רק מה שנספר. שאר המוצרים לא ישתנו.</div>
      </div>

      <div class="eod-filter-row">${filterBtns}</div>

      <div class="eod-col-head">
        <div class="eod-col-head-name">מוצר</div>
        <div class="eod-col-head-r">נשאר</div>
        <div class="eod-col-head-w">פחת</div>
      </div>

      <div class="eod-grid">${rows||'<div class="note">אין מוצרים מסומנים לסוף יום. ניתן לסמן בעריכת מוצר.</div>'}</div>

      <button class="eod-save" id="eod-save-btn">שמור סוף יום ✓</button>
    </div>`;
}

// called inline from EOD rows
window.markEodRow = function(id){
  const row = byId('eod-row-'+id);
  const rInp = byId('eod-r-'+id);
  const wInp = byId('eod-w-'+id);
  if(!row) return;
  const hasVal = (rInp&&rInp.value!=='')||(wInp&&wInp.value!=='');
  row.classList.toggle('has-value', hasVal);
};

function modalMarkup(){
  const m = ui.modal;
  if(!m) return '';
  let body = '';
  if(m.kind==='product')    body = productModal(m.id);
  if(m.kind==='order')      body = orderModal();
  if(m.kind==='production') body = productionModal();
  if(m.kind==='transform')  body = transformModal();
  if(m.kind==='baking')     body = bakingModal();
  if(m.kind==='morning')    body = morningModal();
  return `<div class="modal-overlay" id="modal-overlay"><div class="modal"><div class="handle"></div>${body}</div></div>`;
}

function fabBtn(){
  if(ui.view === 'board'){
    const hasBaking    = state.products.some(function(p){ return num(p.baseStock) > 0; });

      var btns = '';
      if(hasRegulated) btns += '<button class="fab" id="fab-morning" style="background:#0ea5e9;box-shadow:0 4px 16px rgba(14,165,233,.35);font-size:12px;padding:10px 12px;">🌅 פתיחת יום</button>';

      btns += '<button class="fab" id="fab-main" style="font-size:12px;padding:10px 12px;">＋ מוצר</button>';
      return '<div style="position:fixed;bottom:72px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:30;">' + btns + '</div>';
    }
    return '<button class="fab" id="fab-main">＋ מוצר</button>';

  if(ui.view==='orders') return '<button class="fab" id="fab-main">＋ הזמנה</button>';

  return '';
}

function applySave(kind, dataId){
  if(kind==='product'){
    const id = dataId ? Number(dataId) : null;
    const ex = id ? getProduct(id) : null;
    const name = (byId('p-name')?.value||'').trim();
    if(!name){ toast('חסר שם מוצר'); return; }
    const shelfStock = Number(byId('p-shelf')?.value||0);
    const baseStock  = Number(byId('p-base')?.value||0);
    const next = {
      name,
      category:  (byId('p-category')?.value||'').trim()||'אחר',
      stock:     Math.max(0, shelfStock + baseStock),
      shelfStock,
      baseStock,
      minStock:  Number(byId('p-min')?.value||0),
      dailyBurn: Number(byId('p-burn')?.value||1),
      demandMode: byId('p-demand-mode')?.value||'hybrid',
      bufferPct: Number(byId('p-buffer')?.value||25),
      shelfLife: Number(byId('p-life')?.value||3),
      type:      byId('p-type')?.value||'fresh',
      eodTrack:      byId('p-eod')?.checked!==false,
      regulated:     byId('p-regulated')?.checked===true,
      noCarryover:   byId('p-nocarryover')?.checked===true,
      shelfMinAlert: Number(byId('p-shelf-alert')?.value||0),
      baseMinAlert:  Number(byId('p-base-alert')?.value||0),
      weeklyBurn:    Number(byId('p-weekly-burn')?.value||0),
      doughFamily:   byId('p-dough-family')?.value || null,
    };
    if(ex){
      state.products = state.products.map(p=>Number(p.id)===Number(ex.id)?{...p,...next}:p);
      toast('✓ מוצר עודכן');
    } else {
      const cat = next.category;
      if(cat && cat!=='אחר' && !CATEGORIES.some(c=>c.name===cat) && !(state.customCategories||[]).includes(cat)){
        state.customCategories.push(cat);
      }
      state.products.push({id:uid(),...next});
      toast('✓ מוצר נוסף');
    }
    save(); closeModal();
  }

  if(kind==='order'){
    const productId = Number(byId('o-product')?.value||0);
    const date  = byId('o-date')?.value||iso();
    const qty   = Number(byId('o-qty')?.value||0);
    const note  = (byId('o-note')?.value||'').trim();
    if(!productId||qty<=0){ toast('חסר מוצר או כמות'); return; }
    state.orders.push({id:uid(),productId,date,qty,note});
    save(); closeModal(); toast('✓ הזמנה נשמרה');
  }

  if(kind==='morning'){
    const regulated = state.products.filter(function(p){ return p.regulated && num(p.baseStock) > 0; });
    var moved = 0;
    regulated.forEach(function(p){
      var inp = byId('morning-'+p.id);
      var qty = Number(inp?.value||0);
      if(qty <= 0) return;
      qty = Math.min(qty, num(p.baseStock));
      const mShelfB = num(p.shelfStock), mBaseB = num(p.baseStock);
      p.baseStock  = Math.max(0, num(p.baseStock) - qty);
      p.shelfStock = num(p.shelfStock) + qty;
      p.stock      = p.baseStock + p.shelfStock;
      p.lastUpdated = isoTime(); p.lastSource = 'פתיחת יום';
      logInventoryChange(p.id, mShelfB, mBaseB, num(p.shelfStock), num(p.baseStock), 'פתיחת יום');
      state.productions.push({
        id: uid(), productId: p.id, date: iso(), qty: qty,
        note: 'פתיחת יום: '+qty+' יח\' יצאו לחנות'
      });
      moved++;
    });
    save(); closeModal(); render();
    toast('✓ פתיחת יום: '+moved+' מוצרים עודכנו');
    return;
  }

  if(kind==='baking'){
    const pid       = Number(byId('bk-product')?.value);
    const fromBase  = Number(byId('bk-from-base')?.value||0);
    const toShelf   = Number(byId('bk-to-shelf')?.value||0);
    const date      = byId('bk-date')?.value || iso();
    const burned    = fromBase - toShelf;
    const p         = getProduct(pid);
    if(!p){ toast('בחר מוצר'); return; }
    if(fromBase <= 0){ toast('הכנס כמות מבסיס'); return; }
    if(toShelf < 0 || toShelf > fromBase){ toast('כמות מדף לא תקינה'); return; }
    const bkShelfB = num(p.shelfStock), bkBaseB = num(p.baseStock);
    p.baseStock  = Math.max(0, num(p.baseStock) - fromBase);
    p.shelfStock = num(p.shelfStock) + toShelf;
    p.stock      = p.shelfStock + p.baseStock;
    p.lastUpdated = isoTime(); p.lastSource = 'אפייה';
    logInventoryChange(pid, bkShelfB, bkBaseB, num(p.shelfStock), num(p.baseStock), 'אפייה');
    state.productions.push({id:uid(), productId:pid, date, qty:toShelf,
      note:`אפייה: ${fromBase} מבסיס → ${toShelf} למדף (שריפה: ${burned})`});
    save(); closeModal(); render();
    toast(`✓ ${p.name}: בסיס −${fromBase} | מדף +${toShelf} | שריפה ${burned}`);
    return;
  }

  if(kind==='production'){
    const productId = Number(byId('pr-product')?.value||0);
    const date  = byId('pr-date')?.value||iso();
    const qty   = Number(byId('pr-qty')?.value||0);
    const note  = (byId('pr-note')?.value||'').trim();
    if(!productId||qty<=0){ toast('חסר מוצר או כמות'); return; }
    const p = getProduct(productId);
    if(!p){ toast('מוצר לא נמצא'); return; }
    syncProductStock(p, productTotalStock(p) + qty);
    state.productions.push({id:uid(),productId,date,qty,note});
    const pp = getProduct(productId);
    if(pp){ pp.lastProdDate = isoTime(); pp.lastProdSource = 'ייצור'; }
    save(); closeModal(); toast('✓ ייצור נרשם');
  }

  if(kind==='transform'){
    const sourceId = Number(byId('t-source')?.value||0);
    const targetId = Number(byId('t-target')?.value||0);
    const qty   = Number(byId('t-qty')?.value||0);
    const ratio = Number(byId('t-ratio')?.value||1);
    const note  = (byId('t-note')?.value||'').trim();
    const saveRule = byId('t-save-rule')?.checked;
    if(!sourceId||!targetId||sourceId===targetId||qty<=0||ratio<=0){
      toast('בדוק מקור, יעד, כמות ויחס'); return;
    }
    const src = getProduct(sourceId);
    const tgt = getProduct(targetId);
    if(!src||!tgt){ toast('מוצר לא נמצא'); return; }
    if(Number(src.stock||0)<qty){ toast('אין מספיק מלאי מקור'); return; }
    syncProductStock(src, productTotalStock(src) - qty);
    syncProductStock(tgt, productTotalStock(tgt) + Math.round(qty*ratio*100)/100);
    if(saveRule && !state.transforms.some(t=>Number(t.sourceId)===sourceId&&Number(t.targetId)===targetId)){
      state.transforms.push({id:uid(),sourceId,targetId,ratio,note});
    }
    save(); closeModal(); toast('✓ המרה בוצעה');
  }
}

function saveEOD(){
  const eodProducts = state.products.filter(p=>p.eodTrack!==false);
  let count = 0;
  eodProducts.forEach(p=>{
    const rEl = byId('eod-r-'+p.id);
    const wEl = byId('eod-w-'+p.id);
    const rVal = rEl?.value;
    const wVal = wEl?.value||'0';
    if(rVal===''||rVal===undefined||rVal===null) return;
    const remaining = Number(rVal);
    const waste     = Number(wVal);
    if(p.noCarryover) return; // נשאר הולך להמרה — לא נספר
    syncProductStock(p, remaining, 'סוף יום');
    state.endDays.push({
      id: uid(), productId: p.id,
      date: iso(), remaining, waste, note: ''
    });
    count++;
  });
  if(!count){ toast('לא הוזנו נתונים'); return; }
  var eodManualId = updateLogId('EOD');
  logUpdate({ id:eodManualId, type:'eod', ts:isoTime(), source:'EOD ידני מאדמין', count:count, skipped:0, errors:[], status:'ok' });
  save();
  toast(`✓ סוף יום נשמר — ${count} מוצרים עודכנו`);
  ui.view = 'board';
  render();
}

function downloadBackup(){
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const filename = 'condit-backup-' + iso() + '.json';
  if(navigator.share){
    navigator.share({ title:'גיבוי קונדיטוריה', files:[new File([blob],filename,{type:'application/json'})] })
      .then(()=>toast('✓ גיבוי שותף'))
      .catch(()=>{ _downloadBlob(blob,filename); });
  } else {
    _downloadBlob(blob, filename);
  }
}
function _downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'),{href:url,download:filename});
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('✓ גיבוי הורד');
}

function importAnyFile(){
  var inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.csv,.txt,.xlsx,.xls,.pdf,text/csv,text/plain,application/pdf,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel';
  inp.style.display = 'none';
  document.body.appendChild(inp);
  inp.onchange = function(e){
    var file = e.target.files[0];
    document.body.removeChild(inp);
    if(!file) return;
    var ext = file.name.toLowerCase().split('.').pop();

    if(ext==='pdf' || file.type==='application/pdf'){
      // ── PDF path ──
      toast('⏳ קורא PDF...');
      function runPDF(f){
        f.arrayBuffer().then(function(buf){
          pdfjsLib.getDocument({data:buf}).promise.then(function(pdf){
            var pages=[], i=1;
            function nextPage(){
              if(i>pdf.numPages){ _parsePDFText(pages.join('\n'), f.name); return; }
              pdf.getPage(i++).then(function(pg){
                pg.getTextContent().then(function(tc){
                  pages.push(tc.items.map(function(it){return it.str;}).join(' '));
                  nextPage();
                });
              });
            }
            nextPage();
          });
        }).catch(function(err){ toast('שגיאה בקריאת PDF: '+(err.message||'')); });
      }
      if(window.pdfjsLib){
        runPDF(file);
      } else {
        var sc=document.createElement('script');
        sc.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        sc.onload=function(){
          window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          runPDF(file);
        };
        sc.onerror=function(){ toast('לא הצלחתי לטעון PDF.js'); };
        document.head.appendChild(sc);
      }

    } else if(ext==='xlsx' || ext==='xls'){
      // ── Excel path ──
      if(typeof XLSX==='undefined'){ toast('ספריית Excel טוענת... נסה שוב בעוד שנייה'); return; }
      var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array',cellDates:false});
          _processXLSXImport(wb);
        }catch(err){ toast('שגיאה בקריאת Excel: '+(err.message||'')); }
      };
      reader.readAsArrayBuffer(file);

    } else {
      // ── CSV / text path ──
      var reader=new FileReader();
      reader.onload=function(ev){
        try{ _processCSVImport(ev.target.result.replace(/^\uFEFF/,'')); }
        catch(err){ toast('שגיאה בקריאת CSV: '+(err.message||'')); }
      };
      reader.readAsText(file,'UTF-8');
    }
  };
  inp.click();
}

function loadMappings(){
  try{
    const saved = JSON.parse(localStorage.getItem('condit_csv_map')||'{}');
    // Merge defaults — saved takes priority (user overrides)
    return Object.assign({}, DEFAULT_CSV_MAPPINGS, saved);
  } catch(e){ return Object.assign({}, DEFAULT_CSV_MAPPINGS); }
}
function saveMappings(m){ localStorage.setItem('condit_csv_map', JSON.stringify(m)); }

function normalizeStr(s){
  return String(s||'')
    .trim()
    .replace(/[\u05f3\u2019\u2018`]/g, "'")
    .replace(/%/g, '')
    .replace(/\s+/g, ' ')
    .toLowerCase();
}

function fuzzyMatch(csvName, products){
  var cn = normalizeStr(csvName);

  // 1. exact match after normalization
  var m = products.find(function(p){ return normalizeStr(p.name) === cn; });
  if(m) return { product: m, score: 1 };

  // 2. containment — only if strings are similar length (ratio >= 0.75)
  m = products.find(function(p){
    var pn = normalizeStr(p.name);
    var longer  = cn.length >= pn.length ? cn : pn;
    var shorter = cn.length <  pn.length ? cn : pn;
    if(shorter.length < 3) return false;
    if(shorter.length / longer.length < 0.75) return false; // must be close in length
    var idx = longer.indexOf(shorter);
    if(idx === -1) return false;
    var before = idx === 0 || longer[idx-1] === ' ';
    var after  = idx+shorter.length === longer.length || longer[idx+shorter.length] === ' ';
    return before && after;
  });
  if(m) return { product: m, score: 0.8 };

  // 3. ALL words of BOTH names must match (100% overlap both ways)
  var cWords = cn.split(' ').filter(function(w){ return w.length > 2; });
  if(cWords.length === 0) return null;
  var best = null;
  products.forEach(function(p){
    var pWords = normalizeStr(p.name).split(' ').filter(function(w){ return w.length > 2; });
    if(pWords.length === 0) return;
    // All cWords in pWords AND all pWords in cWords
    var allCinP = cWords.every(function(w){ return pWords.indexOf(w) !== -1; });
    var allPinC = pWords.every(function(w){ return cWords.indexOf(w) !== -1; });
    if(allCinP && allPinC) best = p;
  });
  if(best) return { product: best, score: 0.9 };
  return null;
}


function parseCSVRow(row){
  var res = [], cur = '', inQ = false;
  for(var i = 0; i < row.length; i++){
    var c = row[i];
    if(c === '"'){ inQ = !inQ; continue; }
    if(c === ',' && !inQ){ res.push(cur.trim()); cur = ''; continue; }
    cur += c;
  }
  res.push(cur.trim());
  return res;
}


// ── IMPORT STATE (preview before write) ──
var pendingImport = null; // {type, date, matched:[{csvName,product,qty}], unmatched:[str]}

// ── helpers called by importAnyFile ──
function _processCSVImport(text){
  var lines = text.split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
  if(!lines.length){ toast('קובץ ריק'); return; }
  var headers = parseCSVRow(lines[0]);
  var idxName=-1, idxQty=-1, idxDate=-1;
  headers.forEach(function(h,i){
    if(h.indexOf('מוצר')!==-1)  idxName=i;
    if(h.indexOf('כמות')!==-1)  idxQty=i;
    if(h.indexOf('תאריך')!==-1) idxDate=i;
  });
  // fallback: first col = name, second col = qty
  if(idxName<0) idxName=0;
  if(idxQty<0)  idxQty=1;
  var rows    = lines.slice(1).map(parseCSVRow);
  var date    = (idxDate>=0 && rows[0] && rows[0][idxDate]) || iso();
  var mappings= loadMappings();
  var matched=[], unmatched=[];
  rows.forEach(function(row){
    var csvName=row[idxName]; var qty=row[idxQty];
    if(!csvName) return;
    if(qty===''||qty===undefined||qty===null) qty=0;
    var product=null;
    if(mappings[csvName]) product=state.products.find(function(p){ return String(p.id)===String(mappings[csvName]); });
    if(!product){ var res=fuzzyMatch(csvName,state.products); if(res) product=res.product; }
    if(product) matched.push({csvName:csvName,product:product,qty:parseFloat(qty)||0});
    else        unmatched.push(csvName);
  });
  pendingImport={type:'csv',date:date,matched:matched,unmatched:unmatched,isEOD:true};
  showPreviewModal();
}

function _processXLSXImport(workbook){
  var SKIP=['לחמים','מאפים','קונדיטוריה','מטבח','ממרחים','רטבים','תוספות','בואיקוס','פשטידה','קיש','נשנושים','מגש','שליחויות','שעת','טבלת','יום '];
  var mappings=loadMappings(), allMatched=[], allUnmatched=[], firstDate=iso(), sheetCount=workbook.SheetNames.length;
  workbook.SheetNames.forEach(function(sheetName,si){
    var sheet=workbook.Sheets[sheetName];
    var rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:'',raw:true});
    if(!rows||rows.length<2) return;
    var dateStr=iso();
    var dm=sheetName.match(/(\d{1,2})[./](\d{1,2})[./](\d{2,4})/);
    if(dm){ var y=dm[3].length===2?'20'+dm[3]:dm[3]; dateStr=y+'-'+dm[2].padStart(2,'0')+'-'+dm[1].padStart(2,'0'); }
    if(si===0) firstDate=dateStr;
    var isEOD=false, eodNameCol=2, eodQtyCol=3;
    if(rows[0]){
      var h0=rows[0].map(function(c){ return String(c||''); });
      if(h0.some(function(c){ return c.indexOf('כמות נשארה')!==-1; })){
        isEOD=true;
        h0.forEach(function(c,i){ if(c.indexOf('מוצר')!==-1) eodNameCol=i; if(c.indexOf('כמות נשארה')!==-1) eodQtyCol=i; });
      }
    }
    var dataRows=isEOD?rows.slice(1):rows;
    dataRows.forEach(function(row){
      if(!row||row.length<2) return;
      var name,total;
      if(isEOD){ name=String(row[eodNameCol]||'').trim(); total=row[eodQtyCol]; }
      else{ name=String(row[0]||'').trim(); total=(row[11]!==undefined&&row[11]!==null&&row[11]!=='')?row[11]:row[1]; }
      if(!name||name.length<2) return;
      if(!isEOD && SKIP.some(function(s){ return name.indexOf(s)!==-1; })) return;
      var qty=parseFloat(total);
      if(!qty||qty<=0||isNaN(qty)) return;
      qty=Math.round(qty*100)/100;
      var product=null;
      if(mappings[name]) product=state.products.find(function(p){ return String(p.id)===String(mappings[name]); });
      if(!product){ var res=fuzzyMatch(name,state.products); if(res) product=res.product; }
      if(product) allMatched.push({csvName:name,product:product,qty:qty,date:dateStr,sheet:sheetName});
      else if(allUnmatched.indexOf(name)===-1) allUnmatched.push(name);
    });
  });
  var detectedEOD=false;
  workbook.SheetNames.forEach(function(sn){ var s=workbook.Sheets[sn]; var r=XLSX.utils.sheet_to_json(s,{header:1,defval:'',raw:true}); for(var ri=0;ri<Math.min(3,r.length);ri++){ if(r[ri]&&r[ri].some(function(c){ return String(c||'').indexOf('כמות נשארה')!==-1; })){ detectedEOD=true; break; } } });
  pendingImport={type:'xlsx',date:firstDate,sheetCount:sheetCount,matched:allMatched,unmatched:allUnmatched,isEOD:detectedEOD};
  showPreviewModal();
}

function importEODcsv(){
  var inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.csv,text/csv,text/plain';
  inp.style.display = 'none';
  document.body.appendChild(inp);
  inp.onchange = function(e){
    var file = e.target.files[0];
    document.body.removeChild(inp);
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try {
        var text    = ev.target.result.replace(/^\uFEFF/, '');
        var lines   = text.split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
        var headers = parseCSVRow(lines[0]);
        var idxName = -1, idxQty = -1, idxDate = -1;
        headers.forEach(function(h, i){
          if(h.indexOf('מוצר')  !== -1) idxName = i;
          if(h.indexOf('כמות')  !== -1) idxQty  = i;
          if(h.indexOf('תאריך') !== -1) idxDate = i;
        });
        if(idxName < 0 || idxQty < 0){ toast('CSV לא תקין'); return; }

        var rows     = lines.slice(1).map(parseCSVRow);
        var date     = (rows[0] && rows[0][idxDate]) || iso();
        var mappings = loadMappings();
        var matched = [], unmatched = [];

        rows.forEach(function(row){
          var csvName = row[idxName];
          var qty     = row[idxQty];
          if(!csvName) return;
          // empty qty = 0 (sold out), not unknown
          if(qty === '' || qty === undefined || qty === null) qty = 0;

          var product = null;
          if(mappings[csvName]){
            product = state.products.find(function(p){ return String(p.id) === String(mappings[csvName]); });
          }
          if(!product){
            var res = fuzzyMatch(csvName, state.products);
            if(res){ product = res.product; }
          }

          if(product){
            matched.push({ csvName: csvName, product: product, qty: qty===''?null:parseFloat(qty)||0 });
          } else {
            unmatched.push(csvName);
          }
        });

        pendingImport = { type:'csv', date:date, matched:matched, unmatched:unmatched, isEOD:true };
        showPreviewModal();
      } catch(err){
        console.error(err); toast('שגיאה בקריאת CSV');
      }
    };
    reader.readAsText(file, 'UTF-8');
  };
  inp.click();
}

function importXLSX(){
  if(typeof XLSX === 'undefined'){ toast('טוען ספריה... נסה שוב'); return; }
  var inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
  inp.style.display = 'none';
  document.body.appendChild(inp);
  inp.onchange = function(e){
    var file = e.target.files[0];
    document.body.removeChild(inp);
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      try {
        var data     = new Uint8Array(ev.target.result);
        var workbook = XLSX.read(data, { type:'array', cellDates:false, cellNF:false, cellStyles:false });
        var SKIP     = ['לחמים','מאפים','קונדיטוריה','מטבח','ממרחים','רטבים','תוספות',
                        'בואיקוס','פשטידה','קיש','נשנושים','מגש','שליחויות','שעת','טבלת','יום '];
        var mappings = loadMappings();
        var allMatched = [], allUnmatched = [], firstDate = iso();
        var sheetCount = workbook.SheetNames.length;

        workbook.SheetNames.forEach(function(sheetName, si){
          var sheet = workbook.Sheets[sheetName];
          var rows  = XLSX.utils.sheet_to_json(sheet, { header:1, defval:'', raw:true });
          if(!rows || rows.length < 4) return;

          var dateStr = iso();
          var dm = sheetName.match(/(\d{1,2})[./](\d{1,2})[./](\d{2,4})/);
          if(dm){
            var y = dm[3].length===2 ? '20'+dm[3] : dm[3];
            dateStr = y+'-'+dm[2].padStart(2,'0')+'-'+dm[1].padStart(2,'0');
          }
          if(si===0) firstDate = dateStr;

          // Detect EOD file: has header with 'כמות נשארה'
          var isEOD = false, eodNameCol = 2, eodQtyCol = 3;
          if(rows[0]){
            var h0 = rows[0].map(function(c){ return String(c||''); });
            if(h0.some(function(c){ return c.indexOf('כמות נשארה')!==-1; })){
              isEOD = true;
              h0.forEach(function(c,i){
                if(c.indexOf('מוצר')!==-1)       eodNameCol=i;
                if(c.indexOf('כמות נשארה')!==-1) eodQtyCol=i;
              });
            }
          }
          var dataRows = isEOD ? rows.slice(1) : rows;

          dataRows.forEach(function(row){
            if(!row || row.length < 2) return;
            var name, total;
            if(isEOD){
              name  = String(row[eodNameCol]||'').trim();
              total = row[eodQtyCol];
            } else {
              name  = String(row[0]||'').trim();
              // Try col L (index 11) first, then col B (index 1)
              total = (row[11] !== undefined && row[11] !== null && row[11] !== '') ? row[11] : row[1];
            }
            if(!name || name.length < 2) return;
            var skip = !isEOD && SKIP.some(function(s){ return name.indexOf(s)!==-1; });
            if(skip) return;
            var qty = parseFloat(total);
            if(!qty || qty <= 0 || isNaN(qty)) return;
            qty = Math.round(qty*100)/100;

            var product = null;
            if(mappings[name]){
              product = state.products.find(function(p){ return String(p.id)===String(mappings[name]); });
            }
            if(!product){
              var res = fuzzyMatch(name, state.products);
              if(res) product = res.product;
            }

            if(product){
              allMatched.push({ csvName:name, product:product, qty:qty, date:dateStr, sheet:sheetName });
            } else {
              if(allUnmatched.indexOf(name)===-1) allUnmatched.push(name);
            }
          });
        });

        // Detect EOD: check ALL sheets for 'כמות נשארה' header
    var detectedEOD = false;
    workbook.SheetNames.forEach(function(sn){
      var s   = workbook.Sheets[sn];
      var r   = XLSX.utils.sheet_to_json(s, {header:1, defval:'', raw:true});
      // Check first 3 rows for the EOD header
      for(var ri=0; ri<Math.min(3,r.length); ri++){
        if(r[ri] && r[ri].some(function(c){
          return String(c||'').indexOf('כמות נשארה')!==-1;
        })){ detectedEOD = true; break; }
      }
    });
    pendingImport = { type:'xlsx', date:firstDate, sheetCount:sheetCount,
                          matched:allMatched, unmatched:allUnmatched, isEOD:detectedEOD };
        showPreviewModal();
      } catch(err){
        console.error('XLSX error:', err);
        toast('שגיאה: ' + (err.message||'קריאת XLSX נכשלה'));
      }
    };
    reader.readAsArrayBuffer(file);
  };
  inp.click();
}

// ── PDF IMPORT ──
function importPDF(){
  var inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.pdf,application/pdf';
  inp.style.display = 'none';
  document.body.appendChild(inp);
  inp.onchange = function(e){
    var file = e.target.files[0];
    document.body.removeChild(inp);
    if(!file) return;
    toast('⏳ קורא PDF...');
    // Lazy-load PDF.js
    if(!window.pdfjsLib){
      var script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      script.onload = function(){
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        _readPDFFile(file);
      };
      script.onerror = function(){ toast('⚠ לא הצלחתי לטעון PDF.js'); };
      document.head.appendChild(script);
    } else {
      _readPDFFile(file);
    }
  };
  inp.click();
}

async function _readPDFFile(file){
  try {
    var arrayBuffer = await file.arrayBuffer();
    var pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    var fullText = '';
    for(var i = 1; i <= pdf.numPages; i++){
      var page    = await pdf.getPage(i);
      var content = await page.getTextContent();
      var pageText = content.items.map(function(it){ return it.str; }).join(' ');
      fullText += pageText + '\n';
    }
    _parsePDFText(fullText, file.name);
  } catch(err){
    console.error('PDF read error', err);
    toast('⚠ שגיאה בקריאת PDF: ' + (err.message||''));
  }
}

function _parsePDFText(text, filename){
  // Detect date in filename or text: DD/MM/YYYY or YYYY-MM-DD
  var date = iso();
  var dm = (filename + ' ' + text).match(/(\d{1,2})[./](\d{1,2})[./](\d{2,4})/);
  if(dm){
    var y = dm[3].length===2 ? '20'+dm[3] : dm[3];
    date = y + '-' + dm[2].padStart(2,'0') + '-' + dm[1].padStart(2,'0');
  }

  // Split into lines, try to extract name + number pairs
  var lines = text.split(/[\n\r]+/).map(function(l){ return l.trim(); }).filter(Boolean);
  var mappings = loadMappings();
  var matched = [], unmatched = [];
  var seen = {};

  lines.forEach(function(line){
    // Skip obvious header/footer lines
    if(line.length < 2) return;
    if(/^(סה"כ|total|סיכום|הזמנה|תאריך|לקוח|כתובת|טלפון|עמוד|page|\d+\/\d+)/i.test(line)) return;

    // Pattern: text followed by number (or number then text)
    // e.g. "לחם שיפון 5" or "5 לחם שיפון" or "לחם שיפון: 5"
    var m = line.match(/^(.+?)\s*[:\-]?\s*(\d+(?:\.\d+)?)\s*(?:יח['׳]?|יחידות|ק"ג|kg|units?)?\s*$/);
    if(!m) m = line.match(/^(\d+(?:\.\d+)?)\s+(.+)$/);
    if(!m) return;

    var rawName, rawQty;
    if(/^\d/.test(m[1])){ rawName = m[2]; rawQty = m[1]; }
    else                 { rawName = m[1]; rawQty = m[2]; }

    rawName = rawName.trim().replace(/[:\-]+$/, '').trim();
    var qty = parseFloat(rawQty);
    if(!rawName || rawName.length < 2 || !qty || qty <= 0 || isNaN(qty)) return;
    if(qty > 9999) return; // sanity

    var key = rawName + '|' + qty;
    if(seen[key]) return;
    seen[key] = true;

    var product = null;
    if(mappings[rawName]){
      product = state.products.find(function(p){ return String(p.id) === String(mappings[rawName]); });
    }
    if(!product){
      var res = fuzzyMatch(rawName, state.products);
      if(res) product = res.product;
    }

    if(product){ matched.push({ csvName: rawName, product: product, qty: qty }); }
    else        { unmatched.push(rawName); }
  });

  if(!matched.length && !unmatched.length){
    // Fallback: try every token pair in the whole text
    var tokens = text.split(/\s+/);
    for(var i = 0; i < tokens.length - 1; i++){
      var num = parseFloat(tokens[i+1]);
      if(!isNaN(num) && num > 0 && num < 9999 && tokens[i].length > 2){
        var nm = tokens[i];
        if(!seen[nm]){
          seen[nm] = true;
          var res2 = fuzzyMatch(nm, state.products);
          if(res2) matched.push({ csvName: nm, product: res2.product, qty: num });
          else     unmatched.push(nm);
        }
      }
    }
  }

  if(!matched.length && !unmatched.length){
    toast('לא נמצאו נתונים בPDF — בדוק פורמט');
    showPDFRawModal(text);
    return;
  }

  pendingImport = { type:'pdf', date:date, matched:matched, unmatched:unmatched, isEOD:false };
  toast('✓ PDF נקרא — ' + matched.length + ' מוצרים זוהו');
  showPreviewModal();
}

function showPDFRawModal(text){
  var ov = document.createElement('div');
  ov.id = 'pdf-raw-modal';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow:auto;';
  ov.innerHTML = '<div style="background:#fff;border-radius:12px;padding:20px;max-width:600px;width:100%;direction:rtl;">'
    + '<div style="font-size:15px;font-weight:800;margin-bottom:10px;">📄 טקסט גולמי מה-PDF</div>'

    + '<textarea style="width:100%;height:200px;font-size:12px;direction:ltr;font-family:monospace;border:1px solid #ddd;border-radius:6px;padding:8px;box-sizing:border-box;" readonly>'
    + escHtml(text.slice(0,3000))

    + '</div>';
  document.body.appendChild(ov);
}

    : p.date + ' (csv)';

  var overlay = document.createElement('div');
  overlay.id = 'preview-overlay';

    +'<div style="font-size:11px;color:#8ea0b8;margin-bottom:4px">'+label+'</div>'
