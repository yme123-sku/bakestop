<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>בצקים — דוח ייצור</title>
<style>
:root{
  --bg:#f0f2f5;
  --surface:#fff;
  --border:#e4e8ee;
  --text:#111827;
  --muted:#6b7688;
  --primary:#2563eb;
  --primary-soft:#eff6ff;
  --primary-border:#bfdbfe;
  --success:#15803d;
  --success-soft:#f0fdf4;
  --success-border:#bbf7d0;
  --danger:#dc2626;
  --danger-soft:#fff5f5;
  --danger-border:#fecaca;
  --warning:#b45309;
  --warning-soft:#fffbeb;
  --warning-border:#fde68a;
  --radius:13px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg)}
body{font-family:'Segoe UI',system-ui,Arial,sans-serif;direction:rtl;color:var(--text);-webkit-font-smoothing:antialiased}
button,input,select{font:inherit;outline:none}

/* SCREENS */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* LOGIN */
#screen-login{
  align-items:center;justify-content:center;padding:32px 24px;
  background:linear-gradient(160deg,#1e3a8a,#2563eb)
}
.login-title{font-size:26px;font-weight:800;color:#fff;margin-bottom:4px}
.login-sub{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:32px}
.login-input{
  width:100%;max-width:320px;background:rgba(255,255,255,.15);
  border:2px solid rgba(255,255,255,.3);border-radius:var(--radius);
  padding:15px 18px;font-size:20px;font-weight:700;color:#fff;
  text-align:center;margin-bottom:12px
}
.login-input::placeholder{color:rgba(255,255,255,.4)}
.login-input:focus{border-color:rgba(255,255,255,.7)}
.login-go{
  width:100%;max-width:320px;background:#fff;color:var(--primary);
  border:none;border-radius:var(--radius);padding:15px;
  font-size:17px;font-weight:800;cursor:pointer
}

/* MAIN */
#screen-main{background:var(--bg)}
.top-bar{
  position:sticky;top:0;z-index:10;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:12px 16px;box-shadow:0 1px 6px rgba(0,0,0,.07)
}
.top-row{display:flex;justify-content:space-between;align-items:center}
.top-name{font-size:17px;font-weight:800}
.top-date{font-size:11px;color:var(--muted);margin-top:1px}
.top-change{font-size:12px;color:var(--primary);cursor:pointer;font-weight:600}

.content{flex:1;padding:12px 12px 180px}

/* DOUGH FAMILY BLOCK */
.fam-block{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:10px;
  overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.06)
}
.fam-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;border-bottom:1px solid var(--border);
  background:var(--bg)
}
.fam-head-left{display:flex;align-items:center;gap:8px}
.fam-icon{display:none}
.fam-name{font-size:14px;font-weight:800;color:var(--text)}
.fam-sub{font-size:11px;color:var(--muted);margin-top:1px}
.fam-kg-badge{
  font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;
  background:var(--primary-soft);border:1px solid var(--primary-border);color:var(--primary)
}
.fam-kg-badge.empty{background:var(--bg);border-color:var(--border);color:var(--muted)}

/* DOUGH ROW — batchKg input */
.dough-row{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;border-bottom:1px solid var(--border);
  background:#fafbfc
}
.dough-row:last-child{border-bottom:none}
.dough-label{flex:1}
.dough-name{font-size:14px;font-weight:700;color:var(--primary)}
.dough-hint{font-size:11px;color:var(--muted);margin-top:2px}
.dough-input-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.dough-input{
  width:58px;text-align:center;font-size:15px;font-weight:700;
  border:2px solid var(--border);border-radius:10px;padding:8px 4px;
  background:var(--bg);color:var(--muted);
  -webkit-appearance:none;transition:all .15s;opacity:.85
}
.dough-input.has-val{
  border-color:var(--primary-border);background:var(--primary-soft);color:var(--primary)
}
.dough-input-unit{font-size:10px;color:var(--muted)}

/* DOUGH UNITS — שדה ראשי (מצב-עומד) */
.dough-units-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;margin-right:6px;}
.dough-units{
  width:80px;text-align:center;font-size:20px;font-weight:800;
  border:2px solid var(--border);border-radius:10px;padding:9px 4px;
  background:var(--bg);color:var(--muted);
  -webkit-appearance:none;transition:all .15s
}
.dough-units.has-val{
  border-color:#7c3aed33;background:#f5f3ff;color:#7c3aed
}
.dough-units.is-low{
  border-color:#f59e0b;background:#fffbeb;color:#b45309
}
.dough-units.is-zero{
  border-color:#dc2626;background:#fef2f2;color:#b91c1c
}
.dough-units-label{font-size:10px;color:var(--muted)}

/* TODAY BANNER */
.today-banner{
  margin:10px 12px 2px;padding:10px 14px;
  background:var(--warning-soft);border:1px solid var(--warning-border);
  border-radius:var(--radius);font-size:12px;font-weight:700;color:var(--warning);
  display:flex;align-items:center;gap:6px;
}

/* PRODUCT ROW — +/- */
.prod-row{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;border-bottom:1px solid var(--border)
}
.prod-row:last-child{border-bottom:none}
.prod-row.has-qty{background:var(--primary-soft)}
.prod-name{flex:1;font-size:15px;font-weight:600;color:var(--text)}
.prod-plan{font-size:11px;color:var(--primary);font-weight:700;margin-top:2px}
.substate-toggle{display:flex;gap:6px;margin-top:6px}
.substate-btn{flex:1;padding:6px 4px;font-size:12px;font-weight:700;border-radius:8px;
  border:1.5px solid #cbd5e1;background:#f8fafc;color:#64748b;cursor:pointer;transition:all .12s}
.substate-btn.active{border-color:#2563eb;background:#eff6ff;color:#2563eb}
.substate-btn.baked.active{border-color:#d97706;background:#fffbeb;color:#b45309}
.qty-ctrl{display:flex;align-items:center;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.prod-row.has-qty .qty-ctrl{border-color:var(--primary-border);background:var(--primary-soft)}
.qty-btn{width:42px;height:42px;border:none;background:none;font-size:22px;font-weight:300;color:var(--muted);cursor:pointer}
.qty-btn:active{background:var(--primary);color:#fff}
.qty-btn.qty-ten{width:auto;padding:0 10px;font-size:13px;font-weight:800;border-right:none;background:var(--bg)}
.qty-btn.qty-ten:active{background:var(--primary);color:#fff}
.qty-val{min-width:48px;text-align:center;font-size:17px;font-weight:800;color:var(--muted)}
.prod-row.has-qty .qty-val{color:var(--primary)}

/* NOTE (tomorrow dough) */
.tomorrow-note{
  font-size:11px;color:var(--warning);font-weight:700;
  background:var(--warning-soft);border-top:1px solid var(--warning-border);
  padding:7px 14px;display:flex;align-items:center;gap:5px
}

/* SUBMIT BAR */
.submit-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  padding:10px 16px 26px;box-shadow:0 -4px 16px rgba(0,0,0,.08)
}
.submit-summary{font-size:13px;color:var(--muted);text-align:center;margin-bottom:8px;font-weight:600}
.submit-summary span{color:var(--primary);font-weight:800}
.submit-btn{
  width:100%;padding:15px;background:var(--primary);color:#fff;
  border:none;border-radius:var(--radius);font-size:17px;font-weight:800;
  cursor:pointer;box-shadow:0 4px 18px rgba(37,99,235,.3)
}
.submit-btn:disabled{background:#94a3b8;box-shadow:none}

/* SUCCESS */
#screen-done{
  align-items:center;justify-content:center;padding:32px 24px;
  background:linear-gradient(160deg,#14532d,#16a34a)
}
.done-icon{font-size:72px;margin-bottom:14px;animation:pop .4s ease}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.done-title{font-size:28px;font-weight:800;color:#fff;margin-bottom:6px}
.done-sub{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:28px;text-align:center}
.done-list{
  width:100%;max-width:340px;background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);border-radius:var(--radius);
  padding:14px;margin-bottom:24px
}
.done-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid rgba(255,255,255,.12);
  color:#fff;font-size:13px
}
.done-item:last-child{border-bottom:none}
.done-item-qty{font-weight:800;font-size:15px}
.done-again{
  background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);
  color:#fff;border-radius:var(--radius);padding:13px 28px;
  font-size:15px;font-weight:700;cursor:pointer
}

/* LOADING */
.loading{
  position:fixed;inset:0;background:rgba(255,255,255,.88);
  z-index:100;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px
}
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;font-weight:600;color:var(--muted)}
</style>
</head>

<!-- LOGIN -->
<div id="screen-login" class="screen active">

      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span onclick="showHistoryScreen()" style="font-size:12px;color:var(--primary);cursor:pointer;font-weight:700;background:var(--primary-soft);border:1px solid var(--primary-border);padding:4px 10px;border-radius:999px;">היסטוריה</span>

    </div>
  </div>
  <div id="today-banner" style="display:none"></div>

  <div class="submit-bar">

  <div class="done-list" id="done-list"></div>
  <button class="done-again" id="btn-again">דוח נוסף</button>
</div>

<div class="loading" id="loading" style="display:none">
  <div class="spinner"></div>
  <div class="loading-text">טוען...</div>
</div>

function isFrozenProductB(p){
  if(!p) return false;
  if(p.lifecycle === 'frozen' || p.lifecycle === 'frozen_exit') return true;
  if(p.lifecycle === 'direct') return false;
  return p.regulated === true; // fallback: מוצר ישן בלי lifecycle
}

async function loadData(){
  try{
    const res  = await fetch(SB_URL+'/rest/v1/condit_state?id=eq.main&select=data',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    const rows = await res.json();
    if(!rows||!rows[0]||!rows[0].data) return;
    const data = rows[0].data;
    allProducts = Array.isArray(data.products) ? data.products : [];

    // Always use hardcoded BAKER_FAMILIES — never override from cloud
    // (baker_families in cloud may be stale)
    activeFamilies = BAKER_FAMILIES;

    // Load plan for today/tomorrow
    const today = isoDate();
    let offset=1;
    while(new Date(new Date().getTime()+offset*86400000).getDay()===6) offset++;
    const tomorrow = new Date(new Date().getTime()+offset*86400000).toISOString().slice(0,10);
    planMap = {};
    if(Array.isArray(data.productions)){
      data.productions
        .filter(r=>(r.date===today||r.date===tomorrow)&&r.note==='תכנון מחר')
        .forEach(r=>{
          const p = allProducts.find(p=>Number(p.id)===Number(r.productId));
          if(p) planMap[p.name] = (planMap[p.name]||0)+Number(r.qty||0);
        });
    }
  }catch(e){ console.error(e); }
}

async function saveBakerFamilies(families){
  try {
    // Read current state first
    const res = await fetch(SB_URL+'/rest/v1/condit_state?id=eq.main&select=data',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    const rows = await res.json();
    const data = (rows&&rows[0]&&rows[0].data) ? rows[0].data : {};
    data.baker_families = families;
    await fetch(SB_URL+'/rest/v1/condit_state?id=eq.main',{
      method:'PATCH',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},
      body: JSON.stringify({data})
    });
    activeFamilies = families;
  } catch(e){ console.error(e); }
}

async function addProductToFamily(famId, productName){
  const fam = activeFamilies.find(f=>f.id===famId);
  if(!fam || fam.products.includes(productName)) return;
  fam.products.push(productName);
  await saveBakerFamilies(activeFamilies);
}

async function removeProductFromFamily(famId, productName){
  const fam = activeFamilies.find(f=>f.id===famId);
  if(!fam) return;
  fam.products = fam.products.filter(p=>p!==productName);
  await saveBakerFamilies(activeFamilies);
}

const BAKER_PENDING_KEY = 'baker_pending_sync';

function getBakerQueue(){
  try { return JSON.parse(localStorage.getItem(BAKER_PENDING_KEY) || '[]'); } catch(e){ return []; }
}
function saveBakerQueue(q){
  localStorage.setItem(BAKER_PENDING_KEY, JSON.stringify(q));
}
function addToBakerQueue(payload){
  var q = getBakerQueue();
  // Remove existing entry for same id
  var filtered = q.filter(function(p){ return p.payload.id !== payload.id; });
  filtered.push({ createdAt: new Date().toISOString(), payload: payload });
  saveBakerQueue(filtered);
}

const BAKER_LAST_ERROR_KEY = 'baker_last_send_error';

function setBakerLastError(msg){
  try{ localStorage.setItem(BAKER_LAST_ERROR_KEY, msg||''); }catch(e){}
}
function getBakerLastError(){
  try{ return localStorage.getItem(BAKER_LAST_ERROR_KEY) || ''; }catch(e){ return ''; }
}

// מחזיר מצב מפורש במקום בוליאן, כדי שהתור יבחין בין כשל-זמני (כדאי לנסות שוב)
// לכשל-קבוע (אסור להחזיר ללולאה):
//   'sent'      — נקלט בהצלחה (2xx), או כבר קיים בשרת (409) — בכל מקרה הסר מהתור
//   'permanent' — כשל-מבנה/הרשאה קבוע (4xx אחר) — הסר מהתור, אל תנסה שוב
//   'retry'     — כשל זמני (רשת / 5xx) — השאר בתור לניסיון חוזר
async function sendBakerToSupabase(payload){
  try {
    var res = await fetch(SB_URL + '/rest/v1/condit_productions', {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(payload)
    });
    // הצלחה אמיתית
    if(res.ok || res.status === 201){
      setBakerLastError('');
      return 'sent';
    }
    // 409 = duplicate key: הרשומה כבר קיימת בשרת. המטרה הושגה — מטופל כהצלחה.
    if(res.status === 409){
      setBakerLastError('');
      return 'sent';
    }
    var bodyText = '';
    try{ bodyText = await res.text(); }catch(e2){}
    // 4xx אחר = כשל קבוע (מבנה/הרשאה/בקשה שגויה). לא יחזור ללולאה.
    if(res.status >= 400 && res.status < 500){
      setBakerLastError('HTTP ' + res.status + (bodyText ? ' — ' + bodyText.slice(0,300) : ''));
      return 'permanent';
    }
    // 5xx = כשל שרת זמני. כדאי לנסות שוב.
    setBakerLastError('HTTP ' + res.status + (bodyText ? ' — ' + bodyText.slice(0,300) : ''));
    return 'retry';
  } catch(e) {
    // שגיאת רשת אמיתית (אין חיבור / timeout). כדאי לנסות שוב.
    setBakerLastError('שגיאת רשת: ' + (e && e.message ? e.message : String(e)));
    return 'retry';
  }
}

async function syncBakerQueue(){
  var q = getBakerQueue();
  if(!q.length) return;
  var remaining = [];
  var droppedPermanent = 0;
  for(var i = 0; i < q.length; i++){
    var result = await sendBakerToSupabase(q[i].payload);
    if(result === 'retry'){
      // כשל זמני בלבד — נשאר בתור לניסיון חוזר
      remaining.push(q[i]);
    } else if(result === 'permanent'){
      // כשל קבוע — מוסר מהתור כדי לא להיתקע בלולאה אינסופית.
      // נשמר ברשימת-נכשלו לעיון (לא חוזר לתור-הניסיון).
      droppedPermanent++;
      archiveFailedBakerReport(q[i]);
    }
    // 'sent' — נקלט (או כבר קיים) — פשוט מוסר מהתור (לא נדחף ל-remaining)
  }
  saveBakerQueue(remaining);
  // אם הוסרו רשומות-כשל-קבוע ואין עוד ממתינים — ננקה את הודעת-השגיאה
  if(remaining.length === 0) setBakerLastError('');
  updateBakerSyncStatus();
}

// שומר דיווח שנכשל לצמיתות (4xx) ברשימה נפרדת — לעיון בלבד, לא לניסיון חוזר.
// מוגבל ל-20 אחרונים כדי לא לנפח את האחסון.
const BAKER_FAILED_KEY = 'baker_failed_reports';
function archiveFailedBakerReport(item){
  try{
    var arr = JSON.parse(localStorage.getItem(BAKER_FAILED_KEY) || '[]');
    arr.push({ archivedAt: new Date().toISOString(), error: getBakerLastError(), item: item });
    if(arr.length > 20) arr = arr.slice(arr.length - 20);
    localStorage.setItem(BAKER_FAILED_KEY, JSON.stringify(arr));
  }catch(e){}
}

function updateBakerSyncStatus(){
  var q  = getBakerQueue();
  var el = document.getElementById('baker-sync-status');
  if(!el) return;
  if(q.length === 0){
    el.textContent = 'מסונכרן';
    el.style.color  = '#15803d';
    el.style.background = '#f0fdf4';
    el.style.borderColor = '#bbf7d0';
    el.onclick = null;
    el.style.cursor = 'default';
  } else {
    var err = getBakerLastError();
    el.textContent = 'ממתין (' + q.length + ')' + (err ? ' ⚠' : '');
    el.style.color  = '#d97706';
    el.style.background = '#fffbeb';
    el.style.borderColor = '#fde68a';
    if(err){
      el.style.cursor = 'pointer';
      el.onclick = function(){ alert('סיבת הכשל בשליחה:\n' + err); };
    }
  }
}

async function submitReport(){
  const entries = [];

  // Dough entries — מצב-עומד ביחידות. היחידות ראשיות; ק"ג משני-תיעודי (סעיף 14).
  // נשלח כל בצק שיש לו ערך-מוצהר (כולל 0 = "נגמר", מצב תקף). בצק ללא מפתח = לא-נגעו → לא נשלח.
  Object.keys(doughUnits).forEach(function(did){
    var units = doughUnits[did];
    if(units == null) return;                 // לא-מוצהר → דילוג
    units = Number(units) || 0;
    var kg = doughKg[did] || 0;
    entries.push({
      type:'dough', id:did, name:did,
      units: units,            // שדה ראשי — מצב-עומד (כולל 0)
      kg: kg||null,            // שדה משני-תיעודי
      // תאימות-קריאה לקוד/תצוגות ישנים שעדיין קוראים qty/doughUnits:
      qty: kg||null, unit:'ק"ג', doughUnits: units
    });
  });

  // Product entries — בלי subState: שיוך קפוא/אפוי נקבע באדמין לפי מסלול-המוצר.
  Object.entries(productQty).forEach(([name, qty])=>{
    if(qty > 0){
      const p = allProducts.find(p=>p.name===name);
      entries.push({ type:'product', id:p?p.id:null, name, qty, unit:'יח\'' });
    }
  });

  if(!entries.length) return false;

  const payload = {
    id:   submitLogId(),
    date: isoDate(),
    submitted_at: new Date().toISOString(),
    worker: workerName,
    role:   'baker',
    entries
  };

  var result = await sendBakerToSupabase(payload);
  if(result === 'retry'){
    // כשל זמני (רשת/שרת) — נכנס לתור, יישלח אוטומטית כשהחיבור יחזור
    addToBakerQueue(payload);
    updateBakerSyncStatus();
    return 'queued';
  }
  if(result === 'permanent'){
    // כשל קבוע (מבנה/הרשאה) — לא נכנס לתור (אין טעם), מיידעים את המשתמש מיד
    updateBakerSyncStatus();
    return 'failed';
  }
  // 'sent' — נקלט בהצלחה
  updateBakerSyncStatus();
  return 'sent';
}

function esc(s){ return s.replace(/[^א-תa-zA-Z0-9]/g,'_'); }

// מחזיר class לשדה-יחידות לפי הספירה: 0=אדום(נגמר), 1=כתום(עומד להיגמר),
// >1=סגול(תקין), undefined/ריק=ניטרלי. סעיף 14.
function doughUnitsClass(v){
  if(v == null) return 'dough-units';
  v = Number(v);
  if(v === 0) return 'dough-units is-zero';
  if(v === 1) return 'dough-units is-low';
  if(v > 1)   return 'dough-units has-val';
  return 'dough-units';
}

function attachEvents(){
  // Dough units inputs (שדה ראשי — מצב-עומד)
  document.querySelectorAll('[data-dough-units]').forEach(inp=>{
    inp.addEventListener('change', ()=>{
      const did = inp.dataset.doughUnits;
      const raw = inp.value.trim();
      if(raw !== '' && /^-?\d+$/.test(raw)){
        // ערך מוצהר (כולל 0). 0=נגמר, 1=עומד-להיגמר. שלילי → 0 (אין ירידה מתחת ל-0).
        var n = parseInt(raw,10);
        if(n < 0) n = 0;
        doughUnits[did] = n;
        inp.value = n;
      } else {
        // שדה ריק (או קלט לא-מספרי) = "לא נוגע" → לא מדווח (שומר ספירה קודמת בענן).
        delete doughUnits[did];
        inp.value = '';
      }
      inp.className = doughUnitsClass(doughUnits[did]);
      // עדכון תג-המשפחה (יחידות; כולל 0 מוצהר עם אזהרה)
      const fam = activeFamilies.find(f=>f.doughs.some(d=>d.id===did));
      if(fam){
        const declaredDoughs = fam.doughs.filter(d=>doughUnits[d.id] != null);
        const famUnitsTot = declaredDoughs.reduce((s,d)=>s+(Number(doughUnits[d.id])||0),0);
        const hasUnits = declaredDoughs.length > 0;
        const anyZero  = declaredDoughs.some(d=>Number(doughUnits[d.id])===0);
        const badge = inp.closest('.fam-block')?.querySelector('.fam-kg-badge');
        if(badge){
          badge.className = 'fam-kg-badge'+(hasUnits?'':' empty');
          badge.textContent = hasUnits ? (famUnitsTot+' יח\''+(anyZero?' ⚠️':'')) : '—';
        }
      }
      updateSummary();
    });
  });

  // (שדה ק"ג ירד — בצקים נספרים ביחידות/מנות בלבד. אין עוד .dough-input)

  document.querySelectorAll('[data-plus10]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const name = decodeEsc(btn.dataset.plus10);
      productQty[name] = (productQty[name]||0)+10;
      updateProdRow(name); updateSummary();
    });
  });
  document.querySelectorAll('[data-minus10]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const name = decodeEsc(btn.dataset.minus10);
      productQty[name] = Math.max(0,(productQty[name]||0)-10);
      if(productQty[name]===0) delete productQty[name];
      updateProdRow(name); updateSummary();
    });
  });
  // Product +/-
  document.querySelectorAll('[data-plus]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const name = decodeEsc(btn.dataset.plus);
      productQty[name] = (productQty[name]||0)+1;
      updateProdRow(name);
      updateSummary();
    });
  });
  document.querySelectorAll('[data-minus]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const name = decodeEsc(btn.dataset.minus);
      productQty[name] = Math.max(0,(productQty[name]||0)-1);
      if(productQty[name]===0) delete productQty[name];
      updateProdRow(name);
      updateSummary();
    });
  });
}

function decodeEsc(s){ return s.replace(/_/g,' '); }

// אופציה 2: הטוגל קפוא/אפוי-קפוא מופיע רק כשהכמות>0 ורק למוצר-קפוא.
// ברירת-מחדל 'raw' (קפוא-גולמי). entry בלי בחירה נקלט באדמין כגולמי ממילא.
function syncSubStateToggle(name, qty){
  const key = esc(name);
  const row = document.getElementById('prow-'+key);
  if(!row) return;
  const p = productByName(name);
  const isFrozen = isFrozenProductB(p);
  let toggle = document.getElementById('substate-'+key);

  if(qty>0 && isFrozen){
    const sub = productSubState[name] || 'raw';
    if(!toggle){
      toggle = document.createElement('div');
      toggle.className = 'substate-toggle';
      toggle.id = 'substate-'+key;
      toggle.innerHTML =
        `<button type="button" class="substate-btn raw ${sub==='raw'?'active':''}" data-sub-raw="${key}">קפוא</button>`+
        `<button type="button" class="substate-btn baked ${sub==='baked'?'active':''}" data-sub-baked="${key}">אפוי-קפוא</button>`;
      row.appendChild(toggle);
      toggle.querySelector('[data-sub-raw]').addEventListener('click', ()=>setSubState(name,'raw'));
      toggle.querySelector('[data-sub-baked]').addEventListener('click', ()=>setSubState(name,'baked'));
    }
  } else if(toggle){
    toggle.remove();
    // כשהכמות יורדת ל-0 משחררים גם את הבחירה — דיווח חדש יתחיל מ'raw'
    if(qty===0) delete productSubState[name];
  }
}

function setSubState(name, sub){
  productSubState[name] = sub;
  const key = esc(name);
  const toggle = document.getElementById('substate-'+key);
  if(toggle){
    const rawBtn   = toggle.querySelector('[data-sub-raw]');
    const bakedBtn = toggle.querySelector('[data-sub-baked]');
    if(rawBtn)   rawBtn.className   = 'substate-btn raw '  +(sub==='raw'  ?'active':'');
    if(bakedBtn) bakedBtn.className = 'substate-btn baked '+(sub==='baked'?'active':'');
  }
}

function updateSummary(){
  const btn   = document.getElementById('submit-btn');
  const sumEl = document.getElementById('submit-summary');

  // Build per-family summary
  const famLines = [];
  let anyData = false;

  activeFamilies.forEach(fam=>{
    const declaredDoughs = fam.doughs.filter(d=>doughUnits[d.id] != null);
    const famDoughUnits   = declaredDoughs.reduce((s,d)=>s+(Number(doughUnits[d.id])||0), 0);
    const hasDeclared     = declaredDoughs.length > 0;
    const anyZero         = declaredDoughs.some(d=>Number(doughUnits[d.id])===0);
    const famKg = fam.doughs.reduce((s,d)=>s+(doughKg[d.id]||0), 0);
    const famProds = fam.products.filter(n=>productQty[n]>0);
    const famUnits = famProds.reduce((s,n)=>s+(productQty[n]||0), 0);

    if(hasDeclared || famUnits > 0){
      anyData = true;
      let line = `<b>${fam.name}:</b> `;
      const parts = [];
      if(hasDeclared){
        let dlabel = `${famDoughUnits} יח' בצק${famKg>0?` (${famKg.toFixed(1)} ק"ג)`:''}`;
        if(anyZero) dlabel += ' ⚠️';
        parts.push(dlabel);
      }
      if(famUnits > 0) parts.push(`${famUnits} יח'`);
      line += parts.join(' → ');
      famLines.push(line);
    }
  });

  if(!anyData){
    sumEl.innerHTML = 'מלא מה הכנת היום';
    btn.disabled = true;
  } else {
    sumEl.innerHTML = famLines.join(' &nbsp;|&nbsp; ');
    btn.disabled = false;
  }
}

document.getElementById('submit-btn').addEventListener('click', async ()=>{
  var _sb = document.getElementById('submit-btn');
  if(_sb.dataset.sending === '1') return;
  _sb.dataset.sending = '1'; _sb.disabled = true;
  showLoading(true);
  const result = await submitReport();
  _sb.dataset.sending = '0';
  showLoading(false);

  if(result === 'failed'){
    // כשל קבוע (מבנה/הרשאה) — לא נשמר ולא בתור. מיידעים את המשתמש בבירור.
    var errMsg = getBakerLastError();
    alert('הדיווח לא נשלח — שגיאת מערכת קבועה.\n\n' +
          (errMsg ? errMsg + '\n\n' : '') +
          'הדיווח לא נשמר. צלם מסך זה והעבר למנהל. אין צורך לנסות שוב שוב — נדרש תיקון במערכת.');
    return;
  }

  if(result){
    saveTodayReport(new Date().toISOString());
    // עדכון מצב-עומד מקומי: כל ערך מוצהר (כולל 0=נגמר) הופך לספירה-הקודמת לדוח הבא.
    // פר-בצק עצמאי — בצק שלא דווח (אין מפתח) שומר על ספירתו. סעיף 14.
    Object.keys(doughUnits).forEach(function(did){
      if(doughUnits[did] != null) lastDoughUnits[did] = Number(doughUnits[did])||0;
    });
    // Build per-family summary for done screen
    const famSummaries = [];
    activeFamilies.forEach(fam=>{
      const famKg    = fam.doughs.reduce((s,d)=>s+(doughKg[d.id]||0),0);
      const famDoughU= fam.doughs.reduce((s,d)=>s+(doughUnits[d.id]||0),0);
      const famProds = fam.products.filter(n=>productQty[n]>0);
      const famUnits = famProds.reduce((s,n)=>s+(productQty[n]||0),0);
      if(famDoughU>0||famUnits>0){
        famSummaries.push({fam, famKg, famDoughU, famProds, famUnits});
      }
    });

    document.getElementById('done-title').textContent = result==='queued' ? 'נשמר במכשיר' : 'נשלח!';
    document.getElementById('done-queued-warning').style.display = result==='queued' ? 'block' : 'none';
    document.getElementById('done-sub').textContent = workerName+' · '+isoDate();
    document.getElementById('done-list').innerHTML = famSummaries.map(({fam,famKg,famDoughU,famProds,famUnits})=>`
      <div class="done-item" style="flex-direction:column;align-items:flex-end;gap:3px;">
        <div style="font-weight:800;font-size:14px;">${fam.name}</div>
        ${famDoughU>0?`<div style="font-size:12px;opacity:.8;">${famDoughU} יח' בצק${famKg>0?` · ${famKg.toFixed(1)} ק"ג`:''}</div>`:''}
        ${famProds.map(n=>`<div style="font-size:12px;opacity:.8;">${n}: ${productQty[n]} יח'</div>`).join('')}
      </div>`).join('');

    showScreen('screen-done');
  } else {
    alert('שגיאה בשליחה — נסה שוב');
  }
});

async function requestRemove(type, famId, name){
  var code = prompt('הזן קוד אישור להסרה:');
  if(code === null) return; // cancelled
  if(code.trim() !== '2010'){
    showToast('קוד שגוי');
    return;
  }
  // Code correct — execute immediately
  var fam = activeFamilies.find(f=>f.id===famId);
  if(!fam) return;
  if(type === 'remove_family'){
    activeFamilies = activeFamilies.filter(f=>f.id!==famId);
  } else if(type === 'remove_product'){
    fam.products = fam.products.filter(p=>p!==name);
  }
  await saveBakerFamilies(activeFamilies);
  showToast('✓ הוסר בהצלחה');
  renderContent();
}

  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}

function addProductToAdminState(name){
  // לא יוצר עוד מוצר חדש בענן (condit_state) בעצמו — זה גרם בעבר לבייקר
  // ולגימור להמציא id נפרד, כל אחד בעצמו, לאותו מוצר בפועל. הדיווח
  // יישלח עם id מקומי זמני; אם האדמין לא יזהה אותו הוא יופיע ב"שונות"
  // לשיוך/יצירה, ורק שם נולד ה-id האמיתי היחיד לכל הטפסים.
  if(allProducts.some(p=>p.name===name)) return; // already known locally
  var localId = 'local_' + Date.now();
  allProducts = allProducts.concat([{
    id: localId, name: name, category: 'אחר',
    stock:0, shelfStock:0, baseStock:0,
    minStock:3, dailyBurn:5, type:'fresh', eodTrack:true
  }]);
}

async function loadTodayReports(){
  try{
    var today     = isoDate();
    var yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
    var name      = encodeURIComponent(workerName);
    var res = await fetch(
      SB_URL+'/rest/v1/condit_productions?worker=eq.'+name+'&date=in.('+today+','+yesterday+')&select=id,date,submitted_at,entries&order=submitted_at.desc',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}
    );
    var rows = await res.json();
    todayReports = Array.isArray(rows) ? rows : [];
  }catch(e){ todayReports = []; }
}

// מצב-עומד של בצקים: שולף את הספירה-האחרונה פר-בצק (לפי הופעה-אחרונה, ללא הגבלת-ימים).
// דוחות ממוינים מהחדש לישן; כל doughId נתפס בהופעתו הראשונה במעבר = האחרונה כרונולוגית.
// נפרד מ-todayReports (שנשאר יום+אתמול לתחזית-מוצרים — לא נוגעים בו). סעיף 14.
async function loadLastDoughCounts(){
  try{
    var name = encodeURIComponent(workerName);
    var res = await fetch(
      SB_URL+'/rest/v1/condit_productions?worker=eq.'+name+'&select=submitted_at,entries&order=submitted_at.desc&limit=200',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}
    );
    var rows = await res.json();
    var map = {};
    if(Array.isArray(rows)){
      rows.forEach(function(r){
        (r.entries||[]).forEach(function(e){
          if(e.type==='dough' && e.id){
            // ערך-היחידות: שדה חדש 'units', נופל ל-doughUnits הישן לתאימות-קריאה.
            var u = (e.units != null) ? e.units : e.doughUnits;
            // נתפס רק אם טרם נראה (=ההופעה האחרונה כרונולוגית) ויש ערך-יחידות מוצהר.
            // 0 הוא ערך תקף (בצק שנגמר) — נשמר ולא מסונן. סעיף 14.
            if(map[e.id] === undefined && u != null && !isNaN(Number(u))){
              map[e.id] = Number(u);
            }
          }
        });
      });
    }
    lastDoughUnits = map;
  }catch(e){ lastDoughUnits = {}; }
}

function getProductReportedQtyToday(productName){
  var today = isoDate();
  var total = 0;
  todayReports.filter(r=>r.date===today).forEach(r=>{
    (r.entries||[]).forEach(e=>{
      if(e.type==='product' && e.name===productName) total += Number(e.qty||0);
    });
  });
  return total;
}

function renderHistoryTab(){
  var today     = isoDate();
  var yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);

  if(!todayReports.length){
    return '<div style="padding:24px;text-align:center;color:#9ca3af;font-size:14px;">אין דוחות להצגה</div>';
  }

  var html = '';
  [today, yesterday].forEach(function(date){
    var dayReports = todayReports.filter(r=>r.date===date);
    if(!dayReports.length) return;
    html += `<div style="font-size:11px;font-weight:700;color:#6b7688;padding:10px 14px 4px;">${date===today?'היום':'אתמול'} — ${dayReports.length} דיווח${dayReports.length>1?'ים':''}</div>`;
    dayReports.forEach(function(r){
      var t = new Date(r.submitted_at);
      var hhmm = t.getHours().toString().padStart(2,'0')+':'+t.getMinutes().toString().padStart(2,'0');
      var prods = (r.entries||[]).filter(e=>e.type==='product');
      var doughs = (r.entries||[]).filter(e=>e.type==='dough');
      html += `<div style="background:#fff;border:1px solid #e4e8ee;border-radius:13px;margin:6px 12px;padding:12px 14px;">
        <div style="font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;">🕐 ${hhmm}</div>`;
      if(doughs.length){
        html += `<div style="font-size:11px;color:#6b7688;margin-bottom:4px;">`+doughs.map(function(d){
          var u = (d.units != null) ? d.units : d.doughUnits;
          var k = (d.kg != null) ? d.kg : d.qty;
          var label = (u != null) ? (u + " יח'") : '—';
          if(k) label += ' · ' + k + ' ק"ג';
          return d.name + ': ' + label;
        }).join(' | ')+`</div>`;
      }
      html += prods.map(p=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:2px 0;"><span>${p.name}</span><span style="font-weight:700;">${p.qty} יח'</span></div>`).join('');
      html += `</div>`;
    });
  });
  return html;
}

function showHistoryScreen(){
  var el = document.getElementById('screen-history');
  if(!el){
    el = document.createElement('div');
    el.id = 'screen-history';
    el.className = 'screen';
    el.innerHTML = `
      <div class="top-bar">
        <div class="top-row">
          <span id="history-title" style="font-size:17px;font-weight:800;">היסטוריה</span>
          <span onclick="showScreen('screen-main')" style="font-size:13px;color:var(--primary);cursor:pointer;font-weight:600;">חזרה ›</span>
        </div>
      </div>
      <div id="history-content" style="flex:1;overflow-y:auto;padding-bottom:40px;"></div>`;
    document.body.appendChild(el);
  }
  document.getElementById('history-title').textContent = 'היסטוריה — '+workerName;
  document.getElementById('history-content').innerHTML = '<div style="padding:20px;text-align:center;color:#9ca3af;">טוען...</div>';
  showScreen('screen-history');
  loadTodayReports().then(function(){
    document.getElementById('history-content').innerHTML = renderHistoryTab();
  });
}

// ── SUBMIT: add update log ID ──
function submitLogId(){
  var now  = new Date();
  var dd   = now.toISOString().slice(2,10).replace(/-/g,'');
  var hhmm = now.getHours().toString().padStart(2,'0')+now.getMinutes().toString().padStart(2,'0');
  var name = (workerName||'unknown').replace(/\s+/g,'_').slice(0,10);
  return 'BAKER-'+dd+'-'+name+'-'+hhmm;
}
